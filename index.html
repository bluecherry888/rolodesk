<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolodesk — Relationship Intelligence</title>
  <style>
/* ==========================================================================
   ROLODESK — Relationship Intelligence
   Visual system derived from the Vel Net digital card:
   deep navy foundation, champagne-gold accent, warm bone text, editorial
   serif display, uppercase micro-labels, restrained atmosphere.

   Sections:
     1. Design tokens (dark default · warm ivory light)
     2. Base & typography
     3. Atmosphere & shell
     4. Header
     5. Buttons
     6. Inputs & forms
     7. Surfaces, panels, dividers
     8. Status language (dots, badges, chips)
     9. Tables
    10. Modals & toasts
    11. Import wizard
    12. Filter bar / command surface
    13. Rolodex directory
    14. Calling workspace
    15. Timeline
    16. Recording & transcript
    17. Home page
    18. Dashboard intelligence
    19. Empty states & utilities
    20. Responsive
    21. Motion & accessibility
   ========================================================================== */

/* ===== 1. Design tokens ================================================= */
:root {
  /* foundation — Vel Net navy night */
  --background: #101a2e;
  --background-deep: #0b1020;
  --surface: #16233b;
  --surface-raised: #1c2c49;
  --surface-hover: #22324e;
  --surface-inset: #0d1526;

  /* warm bone text on navy */
  --text-primary: #efe9db;
  --text-secondary: #b4b0a2;
  --text-tertiary: #77796f;

  --border-subtle: rgba(220, 205, 170, 0.13);
  --border-strong: rgba(220, 205, 170, 0.28);

  /* champagne gold */
  --accent: #c6a25c;
  --accent-hover: #dcc18a;
  --accent-deep: #9a7b3c;
  --accent-soft: rgba(198, 162, 92, 0.13);
  --accent-ink: #2a2008;
  --focus-ring: rgba(220, 193, 138, 0.55);

  /* semantic — muted, meaningful only */
  --success: #8fae85;
  --success-soft: rgba(143, 174, 133, 0.14);
  --warning: #d19a3d;
  --warning-soft: rgba(209, 154, 61, 0.13);
  --danger: #c97a66;
  --danger-soft: rgba(201, 122, 102, 0.14);
  --info: #8ba3c7;
  --info-soft: rgba(139, 163, 199, 0.13);

  --shadow-soft: 0 1px 2px rgba(4, 8, 18, 0.35), 0 10px 32px rgba(4, 8, 18, 0.28);
  --shadow-focal: 0 2px 6px rgba(4, 8, 18, 0.4), 0 24px 60px rgba(4, 8, 18, 0.45);
  --shadow-accent: 0 6px 18px rgba(198, 162, 92, 0.22);

  --radius-lg: 16px;
  --radius: 12px;
  --radius-sm: 9px;

  --font-display: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;

  --content-width: 1280px;
  --glow-a: rgba(220, 193, 138, 0.05);
  --glow-b: rgba(60, 90, 140, 0.10);
  --grid-line: rgba(220, 205, 170, 0.022);
}

:root[data-theme="light"] {
  /* warm ivory editorial counterpart — same world, daylight */
  --background: #f2eee4;
  --background-deep: #eae5d8;
  --surface: #faf7ef;
  --surface-raised: #ffffff;
  --surface-hover: #f5f1e6;
  --surface-inset: #ece7da;

  --text-primary: #232a38;
  --text-secondary: #64665a;
  --text-tertiary: #97988c;

  --border-subtle: rgba(90, 80, 50, 0.14);
  --border-strong: rgba(90, 80, 50, 0.28);

  --accent: #af8a44;
  --accent-hover: #c6a25c;
  --accent-deep: #86682e;
  --accent-soft: rgba(175, 138, 68, 0.12);
  --accent-ink: #2a2008;
  --focus-ring: rgba(154, 123, 60, 0.45);

  --success: #5d7d54;
  --success-soft: rgba(93, 125, 84, 0.12);
  --warning: #a4721f;
  --warning-soft: rgba(164, 114, 31, 0.12);
  --danger: #a8503a;
  --danger-soft: rgba(168, 80, 58, 0.10);
  --info: #4f6b96;
  --info-soft: rgba(79, 107, 150, 0.10);

  --shadow-soft: 0 1px 2px rgba(60, 50, 30, 0.06), 0 8px 26px rgba(60, 50, 30, 0.07);
  --shadow-focal: 0 2px 6px rgba(60, 50, 30, 0.08), 0 22px 54px rgba(60, 50, 30, 0.12);
  --shadow-accent: 0 6px 18px rgba(175, 138, 68, 0.18);

  --glow-a: rgba(198, 162, 92, 0.07);
  --glow-b: rgba(120, 140, 175, 0.08);
  --grid-line: rgba(90, 80, 50, 0.03);
}

/* ===== 2. Base & typography ============================================ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
[hidden] { display: none !important; }
body {
  font-family: var(--font-ui);
  background-color: var(--background);
  color: var(--text-primary);
  font-size: 14.5px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; color: inherit; }
a { color: var(--accent-hover); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
:root[data-theme="light"] a { color: var(--accent-deep); }
h1, h2, h3, h4 { margin: 0; font-weight: 500; letter-spacing: -0.01em; }
h1 { font-family: var(--font-display); }
::selection { background: var(--accent-soft); }
::placeholder { color: var(--text-tertiary); }

/* Eyebrows are neutral by default; gold is reserved for the few moments that
   deserve it (hero, the current conversation) — accent discipline. */
.eyebrow {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--text-tertiary); font-weight: 600; font-family: var(--font-ui);
}
.eyebrow.gold { color: var(--accent); }
.mono { font-family: var(--font-mono); font-size: 12px; }
.muted { color: var(--text-tertiary); }
.soft { color: var(--text-secondary); }
.center { text-align: center; }
.num { font-variant-numeric: tabular-nums; }

/* inline SVG icon sizing */
.ico { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; vertical-align: -3px; flex-shrink: 0; }
.ico.lg { width: 20px; height: 20px; }
.ico.xl { width: 26px; height: 26px; stroke-width: 1.4; }

/* ===== 3. Atmosphere & shell =========================================== */
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(90% 70% at 50% -10%, var(--glow-a), transparent 60%),
    radial-gradient(70% 60% at 85% 110%, var(--glow-b), transparent 55%),
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
    radial-gradient(140% 120% at 50% -20%, var(--background) 0%, var(--background) 55%, var(--background-deep) 100%);
  background-size: auto, auto, 56px 56px, 56px 56px, auto;
}
#view { max-width: var(--content-width); margin: 0 auto; padding: 40px 32px 96px; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
.page-head h1 { font-size: clamp(28px, 3.4vw, 38px); font-weight: 500; }
.page-head .sub { color: var(--text-secondary); font-size: 13.5px; margin-top: 6px; }
.row { display: flex; gap: 12px; align-items: center; }
.wrap { flex-wrap: wrap; }
.grow { flex: 1; }

/* ===== 4. Header ======================================================= */
#topbar {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in srgb, var(--background-deep) 82%, transparent);
  backdrop-filter: saturate(1.1) blur(14px);
  border-bottom: 1px solid var(--border-subtle);
}
.topbar-inner { max-width: var(--content-width); margin: 0 auto; display: flex; align-items: center; gap: 26px; padding: 14px 32px; }
.brand { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; background: none; border: 0; padding: 0; text-align: left; }
.brand-name { font-family: var(--font-display); font-size: 17px; letter-spacing: 0.14em; color: var(--text-primary); text-transform: uppercase; }
.brand-sub { font-size: 9px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--accent); }
.topnav { display: flex; gap: 4px; margin-left: 10px; }
.topnav button {
  background: none; border: 0; color: var(--text-secondary); font-size: 13px; font-weight: 500;
  padding: 8px 13px; border-radius: 0; position: relative; letter-spacing: 0.02em;
  transition: color 0.18s;
}
.topnav button::after {
  content: ""; position: absolute; left: 13px; right: 13px; bottom: 2px; height: 1px;
  background: var(--accent); opacity: 0; transform: translateY(2px); transition: opacity 0.18s, transform 0.18s;
}
.topnav button:hover { color: var(--text-primary); }
.topnav button.active { color: var(--text-primary); }
.topnav button.active::after { opacity: 1; transform: none; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.icon-btn {
  background: transparent; border: 1px solid var(--border-subtle); border-radius: 50%;
  width: 34px; height: 34px; display: grid; place-items: center; color: var(--text-secondary);
  transition: border-color 0.18s, color 0.18s;
}
.icon-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.resume-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--accent-soft); color: var(--accent-hover);
  border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
  padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
  letter-spacing: 0.02em; cursor: pointer; transition: border-color 0.18s;
}
:root[data-theme="light"] .resume-pill { color: var(--accent-deep); }
.resume-pill:hover { border-color: var(--accent); }

/* ===== 5. Buttons ====================================================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  border: 1px solid var(--border-strong); background: transparent; color: var(--text-primary);
  font-weight: 500; font-size: 13.5px; padding: 9px 16px; border-radius: var(--radius-sm);
  letter-spacing: 0.01em; transition: border-color 0.18s, background 0.18s, transform 0.18s, color 0.18s;
}
.btn:hover { border-color: var(--accent); background: var(--accent-soft); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: linear-gradient(rgb(220, 193, 138), rgb(198, 162, 92));
  border-color: transparent; color: var(--accent-ink); font-weight: 600;
  box-shadow: var(--shadow-accent);
}
.btn.primary:hover { background: linear-gradient(rgb(228, 204, 155), rgb(206, 172, 104)); border-color: transparent; }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-secondary); }
.btn.ghost:hover { color: var(--text-primary); background: var(--surface-hover); border-color: transparent; }
.btn.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, transparent); background: transparent; }
.btn.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
.btn.sm { padding: 6px 12px; font-size: 12.5px; }
.btn.lg { padding: 13px 24px; font-size: 14.5px; }
.btn.block { width: 100%; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* primary call action — composed, luminous, unmistakable */
.btn-call {
  display: inline-flex; align-items: center; gap: 12px;
  background: linear-gradient(rgb(220, 193, 138), rgb(198, 162, 92));
  border: 0; color: var(--accent-ink); border-radius: var(--radius);
  padding: 14px 26px; font-size: 15px; font-weight: 650; letter-spacing: 0.01em;
  box-shadow: var(--shadow-accent); transition: filter 0.18s, transform 0.18s, box-shadow 0.18s;
}
.btn-call:hover { filter: brightness(1.05); box-shadow: 0 8px 24px rgba(198, 162, 92, 0.3); }
.btn-call:active { transform: translateY(1px); }
.btn-call .call-num { font-family: var(--font-mono); font-size: 13px; font-weight: 500; opacity: 0.82; }
.btn-call:disabled { filter: saturate(0.3) brightness(0.8); cursor: not-allowed; box-shadow: none; }

/* ===== 6. Inputs & forms =============================================== */
input, select, textarea {
  font-family: inherit; font-size: 13.5px; color: var(--text-primary);
  background: var(--surface-inset); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 10px 12px; outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
input:hover, select:hover, textarea:hover { border-color: var(--border-strong); }
input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
label { font-size: 11.5px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--text-tertiary) 50%), linear-gradient(135deg, var(--text-tertiary) 50%, transparent 50%); background-position: calc(100% - 16px) 55%, calc(100% - 11px) 55%; background-size: 5px 5px; background-repeat: no-repeat; padding-right: 30px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field input, .field select, .field textarea { width: 100%; }
.field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .full { grid-column: 1 / -1; }

/* ===== 7. Surfaces, panels, dividers =================================== */
/* Three depths only: canvas (body atmosphere), working surface (flat panels,
   border-defined), focal object (shadowed: call card, modal, drawer). */
.card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); }
.card.pad { padding: 22px 24px; }
.section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--text-tertiary); font-weight: 600; margin: 34px 0 14px;
  display: flex; align-items: center; gap: 8px;
}
.divider { height: 1px; background: var(--border-subtle); margin: 18px 0; }
.kv { display: grid; grid-template-columns: 150px 1fr; gap: 8px 18px; font-size: 13px; }
.kv .k { color: var(--text-tertiary); }
.hint { font-size: 12px; color: var(--text-tertiary); line-height: 1.5; }
.pin-box {
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  background: var(--accent-soft); border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 20px; font-size: 13.5px;
}
.pill-count {
  background: transparent; color: var(--text-secondary); border: 1px solid var(--border-subtle);
  border-radius: 999px; font-size: 10.5px; font-weight: 600; padding: 1px 8px; font-variant-numeric: tabular-nums;
}
.seg { display: inline-flex; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface-inset); }
.seg button { border: 0; background: transparent; padding: 8px 16px; font-weight: 500; font-size: 12.5px; color: var(--text-secondary); letter-spacing: 0.02em; transition: background 0.15s, color 0.15s; }
.seg button.on { background: var(--surface-raised); color: var(--text-primary); }

/* ===== 8. Status language ============================================== */
.badge {
  display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 999px; background: transparent;
  color: var(--text-secondary); border: 1px solid var(--border-subtle); white-space: nowrap;
  letter-spacing: 0.02em;
}
.badge.dot::before, .status-dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.badge.green { color: var(--success); border-color: color-mix(in srgb, var(--success) 35%, transparent); background: var(--success-soft); }
.badge.amber { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 35%, transparent); background: var(--warning-soft); }
.badge.red { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, transparent); background: var(--danger-soft); }
.badge.blue { color: var(--info); border-color: color-mix(in srgb, var(--info) 35%, transparent); background: var(--info-soft); }
.badge.exact { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, transparent); background: var(--danger-soft); }
.badge.possible { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 35%, transparent); background: var(--warning-soft); }

.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  font-size: 12px; font-weight: 500; padding: 6px 13px; border-radius: 999px;
  border: 1px solid var(--border-subtle); background: transparent; color: var(--text-secondary);
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.chip:hover { border-color: var(--border-strong); color: var(--text-primary); }
.chip.on { background: var(--accent-soft); color: var(--accent-hover); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
:root[data-theme="light"] .chip.on { color: var(--accent-deep); }

/* ===== 9. Tables ======================================================= */
.tbl-wrap { overflow-x: auto; border: 1px solid var(--border-subtle); border-radius: var(--radius); background: var(--surface); }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tbl th {
  text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-tertiary); font-weight: 600; padding: 12px 14px;
  border-bottom: 1px solid var(--border-subtle); background: var(--surface); position: sticky; top: 0; z-index: 1;
}
table.tbl td { padding: 12px 14px; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; font-variant-numeric: tabular-nums; }
table.tbl tr:last-child td { border-bottom: 0; }
table.tbl tbody tr { transition: background 0.15s; }
table.tbl tbody tr:hover { background: var(--surface-hover); }
.preview-table td { white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }

/* ===== 10. Modals & toasts ============================================= */
.modal-scrim {
  position: fixed; inset: 0; background: rgba(6, 10, 20, 0.66);
  backdrop-filter: blur(6px); z-index: 100; display: grid; place-items: center; padding: 24px;
  animation: scrim-in 0.2s ease;
}
.modal {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-focal);
  width: 100%; max-width: 560px; max-height: 88vh; overflow: auto;
  animation: modal-in 0.22s ease;
}
.modal.wide { max-width: 760px; }
.modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); z-index: 2; }
.modal-head h3 { font-family: var(--font-display); font-size: 19px; font-weight: 500; }
.modal-body { padding: 22px 24px; }
.modal-foot { padding: 16px 24px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0; background: var(--surface); }
@keyframes scrim-in { from { opacity: 0; } }
@keyframes modal-in { from { opacity: 0; transform: translateY(6px); } }

#toast-root { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast {
  background: var(--surface-raised); color: var(--text-primary); border: 1px solid var(--border-strong);
  padding: 11px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-focal); animation: toast-in 0.22s ease;
}
.toast.good { border-color: color-mix(in srgb, var(--success) 45%, transparent); color: var(--success); }
.toast.bad { border-color: color-mix(in srgb, var(--danger) 45%, transparent); color: var(--danger); }
@keyframes toast-in { from { transform: translateY(8px); opacity: 0; } }

/* ===== 11. Import wizard =============================================== */
.dropzone {
  border: 1px dashed var(--border-strong); border-radius: var(--radius-lg);
  background: color-mix(in srgb, var(--surface) 55%, transparent);
  padding: 60px 28px; text-align: center; transition: border-color 0.2s, background 0.2s;
}
.dropzone.hot { border-color: var(--accent); background: var(--accent-soft); }
.dropzone h3 { font-family: var(--font-display); margin-top: 16px; font-size: 21px; font-weight: 500; }
.dropzone p { color: var(--text-secondary); margin: 8px 0 20px; font-size: 13.5px; }
.dropzone .ico.xl { color: var(--accent); }

.steps { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
.step {
  display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-radius: 999px;
  color: var(--text-tertiary); font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; border: 1px solid transparent;
}
.step .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border-strong); display: grid; place-items: center; font-size: 10px; color: var(--text-tertiary); }
.step.active { color: var(--accent-hover); border-color: color-mix(in srgb, var(--accent) 35%, transparent); background: var(--accent-soft); }
.step.active .dot { border-color: var(--accent); color: var(--accent-hover); }
.step.done { color: var(--success); }
.step.done .dot { border-color: var(--success); color: var(--success); }
:root[data-theme="light"] .step.active { color: var(--accent-deep); }
:root[data-theme="light"] .step.active .dot { color: var(--accent-deep); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1px; background: var(--border-subtle); border: 1px solid var(--border-subtle); border-radius: var(--radius); overflow: hidden; }
.stat-box { padding: 16px 18px; background: var(--surface); }
.stat-box .n { font-size: 24px; font-weight: 500; font-family: var(--font-display); font-variant-numeric: tabular-nums; }
.stat-box .l { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; letter-spacing: 0.04em; }
.stat-box.warn .n { color: var(--warning); }
.stat-box.bad .n { color: var(--danger); }
.stat-box.good .n { color: var(--success); }

.map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.map-row { border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 13px 14px; background: var(--surface); }
.map-row .fld { font-weight: 550; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.map-row select { width: 100%; margin-top: 8px; }
.map-row .sample { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; min-height: 14px; font-family: var(--font-mono); }
.req-star { color: var(--danger); }

/* ===== 12. Filter bar / command surface ================================ */
.filterbar {
  background: color-mix(in srgb, var(--background-deep) 92%, transparent);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-subtle); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 20px;
  position: sticky; top: 64px; z-index: 30;
}
.filterbar .search-wrap { position: relative; flex: 1; min-width: 240px; }
.filterbar .search-wrap input { width: 100%; padding-left: 38px; font-size: 14px; }
.filterbar .search-ic { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); display: flex; }
.filterbar select { min-width: 130px; }
.filter-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }

/* ===== 13. Rolodex directory =========================================== */
.roldex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }
.rol-card {
  background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
  padding: 20px; cursor: pointer; position: relative;
  transition: transform 0.18s, border-color 0.18s, background 0.18s;
}
.rol-card:hover { transform: translateY(-2px); border-color: var(--border-strong); background: var(--surface-raised); }
.rol-card .rc-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
.rol-card .rc-name { font-family: var(--font-display); font-size: 17.5px; font-weight: 500; letter-spacing: 0; }
.rol-card .rc-sub { color: var(--text-secondary); font-size: 12.5px; margin-top: 2px; }
.rol-card .rc-meta { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 14px; font-size: 12px; color: var(--text-secondary); }
.rol-card .rc-meta b { color: var(--text-primary); font-weight: 550; font-variant-numeric: tabular-nums; }
.rol-card .rc-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 13px; border-top: 1px solid var(--border-subtle); font-size: 12px; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface-inset); border: 1px solid var(--border-strong);
  color: var(--text-secondary); display: grid; place-items: center;
  font-weight: 600; font-size: 13.5px; flex-shrink: 0; letter-spacing: 0.04em;
}
.avatar.co { border-radius: var(--radius-sm); }

/* ===== 14. Calling workspace =========================================== */
.call-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
.call-card { background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); box-shadow: var(--shadow-focal); overflow: hidden; }
.call-card .cc-head {
  padding: 26px 28px 22px; border-bottom: 1px solid var(--border-subtle);
  display: flex; gap: 18px; align-items: flex-start;
  background: linear-gradient(color-mix(in srgb, var(--surface-raised) 60%, transparent), transparent);
}
.call-card .cc-avatar {
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--surface-inset); border: 1px solid var(--accent);
  color: var(--accent-hover); display: grid; place-items: center; font-size: 19px; font-weight: 600;
}
:root[data-theme="light"] .call-card .cc-avatar { color: var(--accent-deep); }
.call-card .cc-name { font-family: var(--font-display); font-size: 27px; font-weight: 500; letter-spacing: -0.01em; }
.call-card .cc-title { color: var(--text-secondary); font-size: 14px; margin-top: 3px; }
.call-card .cc-company { color: var(--accent-hover); font-size: 12px; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }
:root[data-theme="light"] .call-card .cc-company { color: var(--accent-deep); }
.cc-body { padding: 22px 28px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 26px; }
.f .fl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); font-weight: 600; }
.f .fv { font-size: 13.5px; margin-top: 3px; word-break: break-word; }
.f .fv a { font-weight: 500; }
.call-actions { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px 28px; border-top: 1px solid var(--border-subtle); align-items: center; }

.tz-clock { text-align: center; padding: 20px 16px 16px; border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); background: var(--surface); }
.tz-clock .now { font-size: 32px; font-weight: 500; font-family: var(--font-display); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.tz-clock .zone { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }
.tz-band {
  margin-top: 14px; padding: 8px 12px; border-radius: 999px; font-weight: 550; font-size: 12px;
  display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--border-subtle); color: var(--text-secondary);
}
.tz-band::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); }
.tz-band.good { color: var(--success); border-color: color-mix(in srgb, var(--success) 40%, transparent); }
.tz-band.good::before { background: var(--success); }
.tz-band.ok::before { background: var(--info); }
.tz-band.warn { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 35%, transparent); }
.tz-band.warn::before { background: var(--warning); }
.tz-band.bad { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, transparent); }
.tz-band.bad::before { background: var(--danger); }

.queue-side { margin-top: 18px; }
.queue-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; font-size: 12.5px; cursor: pointer; transition: background 0.15s; }
.queue-item:hover { background: var(--surface-hover); }
.queue-item.current { border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: var(--accent-soft); }
.queue-item.done { opacity: 0.42; }
.queue-item .qn { flex: 1; }
.queue-num { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-subtle); display: grid; place-items: center; font-size: 10px; font-weight: 600; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

/* ===== 15. Timeline ==================================================== */
.timeline { position: relative; padding-left: 30px; }
.timeline::before { content: ""; position: absolute; left: 9px; top: 6px; bottom: 6px; width: 1px; background: var(--border-subtle); }
.tl-item { position: relative; padding: 0 0 22px; }
.tl-item .tl-dot {
  position: absolute; left: -27px; top: 2px; width: 19px; height: 19px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border-strong);
  display: grid; place-items: center; color: var(--text-secondary);
}
.tl-item .tl-dot .ico { width: 10px; height: 10px; vertical-align: 0; }
.tl-item .tl-head { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
.tl-item .tl-type { font-weight: 550; font-size: 13px; }
.tl-item .tl-time { font-size: 11.5px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
.tl-item .tl-body { font-size: 13px; color: var(--text-secondary); margin-top: 4px; line-height: 1.55; }
.tl-item .tl-body .out { font-weight: 550; color: var(--text-primary); }
.tl-item .hint { margin-top: 3px; }

/* ===== 16. Recording & transcript ====================================== */
.rec-panel { border: 1px solid var(--border-subtle); border-radius: var(--radius); padding: 14px 16px; margin-top: 16px; background: var(--surface-inset); text-align: left; }
.rec-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.rec-live { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--danger); }
.rec-live::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--danger); animation: rec-pulse 1.6s ease-in-out infinite; }
@keyframes rec-pulse { 50% { opacity: 0.35; } }
.rec-time { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
.transcript-box {
  margin-top: 10px; max-height: 120px; overflow-y: auto; font-size: 12.5px; line-height: 1.55;
  color: var(--text-secondary); white-space: pre-wrap; border-top: 1px solid var(--border-subtle); padding-top: 10px;
}
.transcript-box .interim { color: var(--text-tertiary); font-style: italic; }
.transcript-full { white-space: pre-wrap; font-size: 12.5px; line-height: 1.6; color: var(--text-secondary); max-height: 200px; overflow-y: auto; padding: 10px 12px; background: var(--surface-inset); border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
details.tl-transcript summary { cursor: pointer; font-size: 12px; color: var(--accent-hover); margin-top: 6px; }
:root[data-theme="light"] details.tl-transcript summary { color: var(--accent-deep); }
.audio-row { margin-top: 8px; }
.audio-row audio { width: 100%; height: 34px; }
.summary-block { border-left: 2px solid var(--accent); padding: 2px 0 2px 12px; margin-top: 8px; font-size: 13px; color: var(--text-secondary); white-space: pre-wrap; line-height: 1.55; }

/* ===== 17. Home page =================================================== */
.hero { padding: 44px 0 40px; max-width: 720px; }
.hero .eyebrow { margin-bottom: 18px; }
.hero h1 { font-size: clamp(34px, 4.6vw, 52px); font-weight: 450; line-height: 1.12; letter-spacing: -0.015em; text-wrap: balance; }
.hero p { color: var(--text-secondary); margin: 18px 0 0; font-size: 15px; line-height: 1.65; max-width: 56ch; }

.pathways { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; margin: 36px 0 0; }
.pathway {
  text-align: left; border: 1px solid var(--border-subtle); background: var(--surface);
  border-radius: var(--radius-lg); padding: 28px; cursor: pointer; position: relative;
  transition: transform 0.2s, border-color 0.2s, background 0.2s; overflow: hidden;
}
.pathway::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.25s;
  background: radial-gradient(80% 90% at 15% 0%, var(--accent-soft), transparent 55%);
}
.pathway:hover { transform: translateY(-2px); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
.pathway:hover::after { opacity: 1; }
.pathway .path-ico {
  width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
  background: var(--surface-inset); border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent); color: var(--accent-hover);
  margin-bottom: 18px;
}
:root[data-theme="light"] .pathway .path-ico { color: var(--accent-deep); }
.pathway .eyebrow { font-size: 10px; }
.pathway h2 { font-family: var(--font-display); font-size: 23px; font-weight: 500; margin-top: 8px; }
.pathway p { color: var(--text-secondary); margin: 10px 0 0; font-size: 13px; line-height: 1.6; }
.pathway .path-cta { margin-top: 18px; color: var(--accent-hover); font-weight: 550; font-size: 12.5px; display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.03em; }
:root[data-theme="light"] .pathway .path-cta { color: var(--accent-deep); }

.intel { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-top: 54px; padding-top: 34px; border-top: 1px solid var(--border-subtle); }
.intel-group .eyebrow { margin-bottom: 14px; display: block; }
.intel-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border-subtle); font-size: 13.5px; color: var(--text-secondary); }
.intel-row:last-child { border-bottom: 0; }
.intel-row .intel-num { font-family: var(--font-display); font-size: 21px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.intel-row .intel-num.warn { color: var(--warning); }
.intel-row .intel-num.bad { color: var(--danger); }
.home-foot { margin-top: 40px; }

/* ===== 18. Dashboard intelligence ====================================== */
.dash-lede { color: var(--text-secondary); font-size: 14px; max-width: 62ch; line-height: 1.6; margin-top: 8px; }
.dash-section { margin-top: 34px; }
.dash-rows { border-top: 1px solid var(--border-subtle); }
.dash-row { display: flex; justify-content: space-between; align-items: baseline; padding: 13px 2px; border-bottom: 1px solid var(--border-subtle); }
.dash-row .dl { font-size: 13.5px; color: var(--text-secondary); }
.dash-row .dv { font-family: var(--font-display); font-size: 24px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.dash-row .dv.good { color: var(--success); }
.dash-row .dv.warn { color: var(--warning); }
.dash-row .dv.bad { color: var(--danger); }
.dash-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 44px; }

/* ===== 19. Empty states & utilities ==================================== */
.empty { text-align: center; padding: 80px 24px; color: var(--text-tertiary); }
.empty .ic { display: flex; justify-content: center; color: var(--accent); opacity: 0.75; }
.empty h3 { color: var(--text-primary); margin-top: 18px; font-size: 21px; font-family: var(--font-display); font-weight: 500; }
.empty p { margin-top: 8px; font-size: 13.5px; }

/* ===== 20. Responsive ================================================== */
@media (max-width: 1024px) {
  #view { padding: 32px 24px 80px; }
  .dash-cols { grid-template-columns: 1fr; gap: 8px; }
  .call-layout { grid-template-columns: 1fr; }
}
@media (max-width: 820px) {
  .pathways { grid-template-columns: 1fr; }
  .intel { grid-template-columns: 1fr; gap: 26px; }
  .field-grid, .form-grid { grid-template-columns: 1fr; }
  .topnav { gap: 0; margin-left: 0; }
  .topnav button { padding: 8px 9px; font-size: 12.5px; }
  .topbar-inner { padding: 12px 16px; gap: 12px; flex-wrap: wrap; }
  .brand-sub { display: none; }
  #view { padding: 26px 16px 72px; }
  .hero { padding: 22px 0 8px; }
  .cc-head, .cc-body, .call-actions { padding-left: 18px; padding-right: 18px; }
  .filter-controls { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; scrollbar-width: thin; }
  .filter-controls .chips { flex-wrap: nowrap; }
  .btn, .chip, .icon-btn, .queue-item { min-height: 40px; }
  .btn-call { width: 100%; justify-content: center; }
}
@media (max-width: 480px) {
  .page-head h1 { font-size: 26px; }
  .roldex-grid { grid-template-columns: 1fr; }
  .kv { grid-template-columns: 120px 1fr; }
  .modal-scrim { padding: 10px; }
}

/* ===== 21. Motion & accessibility ====================================== */
:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; border-radius: 4px; }
input:focus-visible, select:focus-visible, textarea:focus-visible { outline: none; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}

/* ===== 22. Second pass: directory rows ================================= */
.rol-list { border: 1px solid var(--border-subtle); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
.rol-row {
  display: grid; grid-template-columns: 34px 1.35fr 1fr 1.1fr 110px 110px; gap: 14px;
  align-items: center; width: 100%; text-align: left; background: transparent; border: 0;
  padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); cursor: pointer;
  transition: background 0.15s; font-size: 13px; color: var(--text-secondary);
}
.rol-row:last-child { border-bottom: 0; }
.rol-row:hover { background: var(--surface-hover); }
.rol-row.selected { background: var(--accent-soft); }
.rol-row .rr-name { font-family: var(--font-display); font-size: 15px; color: var(--text-primary); }
.rol-row .rr-role { font-size: 12px; color: var(--text-secondary); }
.rol-row .rr-org { font-size: 12.5px; color: var(--text-secondary); }
.rol-row .rr-next { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rol-row .rr-meta { font-size: 11.5px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
.rol-row .avatar { width: 30px; height: 30px; font-size: 11px; }
.rol-list-head {
  display: grid; grid-template-columns: 34px 1.35fr 1fr 1.1fr 110px 110px; gap: 14px;
  padding: 9px 16px; border-bottom: 1px solid var(--border-subtle);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); font-weight: 600;
}

/* ===== 23. Relationship drawer ========================================= */
.drawer-scrim { position: fixed; inset: 0; background: rgba(6, 10, 20, 0.45); z-index: 90; animation: scrim-in 0.2s ease; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(430px, 94vw); z-index: 95;
  background: var(--surface); border-left: 1px solid var(--border-strong);
  box-shadow: var(--shadow-focal); overflow-y: auto;
  transform: translateX(14px); opacity: 0; transition: transform 0.22s ease, opacity 0.22s ease;
}
.drawer.open { transform: none; opacity: 1; }
.drawer-head { padding: 22px 24px 18px; border-bottom: 1px solid var(--border-subtle); display: flex; gap: 14px; align-items: flex-start; position: sticky; top: 0; background: var(--surface); z-index: 2; }
.drawer-head .dn { font-family: var(--font-display); font-size: 22px; color: var(--text-primary); line-height: 1.15; }
.drawer-head .dr { font-size: 12.5px; color: var(--text-secondary); margin-top: 3px; }
.drawer-body { padding: 20px 24px 28px; }
.drawer-sec { margin-bottom: 20px; }
.drawer-sec .eyebrow { display: block; margin-bottom: 8px; font-size: 10px; }
.drawer-kv { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
.drawer-kv b { color: var(--text-primary); font-weight: 550; }
.drawer-actions { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 4px; }
.drawer .avatar { width: 44px; height: 44px; }
.next-action-line { display: flex; gap: 8px; align-items: baseline; font-size: 13px; color: var(--text-primary); }
.next-action-line .ico { color: var(--text-tertiary); }
.next-action-line em { font-style: normal; color: var(--text-secondary); }

/* ===== 24. Command palette ============================================= */
.palette-scrim { position: fixed; inset: 0; background: rgba(6, 10, 20, 0.5); backdrop-filter: blur(4px); z-index: 120; display: flex; justify-content: center; align-items: flex-start; padding: 12vh 20px 20px; animation: scrim-in 0.15s ease; }
.palette { width: 100%; max-width: 560px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); box-shadow: var(--shadow-focal); overflow: hidden; animation: modal-in 0.18s ease; }
.palette input { width: 100%; border: 0; background: transparent; padding: 16px 18px; font-size: 15px; border-bottom: 1px solid var(--border-subtle); border-radius: 0; }
.palette input:focus { box-shadow: none; }
.palette-list { max-height: 46vh; overflow-y: auto; padding: 6px; }
.palette-item { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: transparent; border: 0; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13.5px; color: var(--text-secondary); cursor: pointer; }
.palette-item .ico { color: var(--text-tertiary); }
.palette-item .pi-hint { margin-left: auto; font-size: 11px; color: var(--text-tertiary); }
.palette-item.active { background: var(--accent-soft); color: var(--text-primary); }
.palette-empty { padding: 22px 18px; font-size: 13px; color: var(--text-tertiary); font-family: var(--font-display); }

/* ===== 25. Narrative history =========================================== */
.narrative { position: relative; padding-left: 26px; }
.narrative::before { content: ""; position: absolute; left: 5px; top: 8px; bottom: 8px; width: 1px; background: var(--border-subtle); }
.nv-item { position: relative; padding: 0 0 24px; }
.nv-item::before { content: ""; position: absolute; left: -24px; top: 7px; width: 7px; height: 7px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border-strong); }
.nv-item.call::before { border-color: var(--accent); }
.nv-when { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-tertiary); font-weight: 600; font-variant-numeric: tabular-nums; }
.nv-what { font-size: 13.5px; color: var(--text-secondary); line-height: 1.65; margin-top: 5px; max-width: 62ch; }
.nv-what b { color: var(--text-primary); font-weight: 550; }
.nv-method { font-size: 11px; color: var(--text-tertiary); margin-left: 8px; letter-spacing: 0.04em; }
details.audit-log { margin-top: 10px; }
details.audit-log summary { cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); font-weight: 600; }
details.audit-log .timeline { margin-top: 14px; }

/* ===== 26. Dashboard intelligence ====================================== */
.intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.intel-panel { border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 22px 24px; background: var(--surface); }
.intel-panel .eyebrow { display: block; margin-bottom: 6px; }
.intel-hero { display: flex; align-items: baseline; gap: 12px; margin: 6px 0 4px; }
.intel-hero .n { font-family: var(--font-display); font-size: 44px; line-height: 1; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.intel-hero .n.warn { color: var(--warning); }
.intel-hero .n.bad { color: var(--danger); }
.intel-hero .n.good { color: var(--success); }
.intel-hero .l { font-size: 13px; color: var(--text-secondary); }
.intel-sub { border-top: 1px solid var(--border-subtle); margin-top: 12px; padding-top: 4px; }
.intel-sub .intel-row { padding: 7px 0; font-size: 12.5px; }
.intel-sub .intel-row .intel-num { font-size: 15px; font-family: var(--font-ui); font-weight: 600; }
.intel-note { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; line-height: 1.5; }

function levenshtein(a, b) {

    // indefinitely — surface it instead of hanging on a blank page.
    req.onblocked = () => {
      const v = document.querySelector('#view');
      if (v) v.innerHTML = '<div class="empty"><h3>Rolodesk is open in another tab</h3><p>An older Rolodesk tab is holding the database. Close or reload your other Rolodesk tabs, then reload this page — nothing is lost.</p></div>';
    };
    req.onsuccess = e => {
      DB = e.target.result;
      // If a future version upgrades in another tab, release our hold so it never blocks.
      DB.onversionchange = () => {

        const v = document.querySelector('#view');
        if (v) v.innerHTML = '<div class="empty"><h3>Rolodesk was updated in another tab</h3><p>Reload this page to continue.</p></div>';

function tx(store, mode = 'readonly') { return DB.transaction(store, mode).objectStore(store); }

  return new Promise((res, rej) => { const r = tx(store).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error); });
}
function idbPut(store, val) {
  return new Promise((res, rej) => { const r = tx(store, 'readwrite').put(val); r.onsuccess = () => res(val); r.onerror = () => rej(r.error); });
}
function idbBulk(store, vals) {
  return new Promise((res, rej) => {
    if (!vals.length) return res();
    const t = DB.transaction(store, 'readwrite'); const os = t.objectStore(store);
    vals.forEach(v => os.put(v));
    t.oncomplete = () => res(); t.onerror = () => rej(t.error);
  });
}
function idbDelete(store, id) {
  return new Promise((res, rej) => { const r = tx(store, 'readwrite').delete(id); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
}
function idbGet(store, id) {
  return new Promise((res, rej) => { const r = tx(store).get(id); r.onsuccess = () => res(r.result || null); r.onerror = () => rej(r.error); });
}

/* ===== 5b. Call recording, live transcript, summary ==================== */
/* Records through the microphone (put the call on speaker to capture both
   sides). Live transcript via the browser's speech recognition where
   available. The summary is generated locally from the transcript. */
const Rec = { mr: null, chunks: [], stream: null, recog: null, transcript: '', interim: '', startedAt: null, active: false, timer: null, onUpdate: null };
const speechSupported = () => !!(window.SpeechRecognition || window.webkitSpeechRecognition);
async function startRecording(onUpdate) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  Rec.stream = stream; Rec.chunks = []; Rec.transcript = ''; Rec.interim = ''; Rec.onUpdate = onUpdate || null;
  const mime = (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) ? 'audio/webm;codecs=opus' : 'audio/webm';
  const mr = new MediaRecorder(stream, { mimeType: mime });
  mr.ondataavailable = e => { if (e.data && e.data.size) Rec.chunks.push(e.data); };
  mr.start(1000);
  Rec.mr = mr; Rec.active = true; Rec.startedAt = Date.now();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = 'en-US';
    r.onresult = ev => {
      let interim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const res = ev.results[i];
        if (res.isFinal) Rec.transcript += res[0].transcript.trim() + '\n';
        else interim += res[0].transcript;
      }
      Rec.interim = interim;
      if (Rec.onUpdate) Rec.onUpdate();
    };
    r.onend = () => { if (Rec.active) { try { r.start(); } catch {} } }; // recognizer stops itself on silence — keep it alive
    try { r.start(); Rec.recog = r; } catch {}
  }
  Rec.timer = setInterval(() => { if (Rec.onUpdate) Rec.onUpdate(); }, 1000);
}
async function stopRecording() {
  if (!Rec.active) return null;
  Rec.active = false;
  clearInterval(Rec.timer); Rec.timer = null;
  if (Rec.recog) { try { Rec.recog.onend = null; Rec.recog.stop(); } catch {} Rec.recog = null; }
  const mr = Rec.mr;
  const blob = await new Promise(res => {
    if (!mr || mr.state === 'inactive') return res(new Blob(Rec.chunks, { type: 'audio/webm' }));
    mr.onstop = () => res(new Blob(Rec.chunks, { type: mr.mimeType || 'audio/webm' }));
    try { mr.stop(); } catch { res(new Blob(Rec.chunks, { type: 'audio/webm' })); }
  });
  if (Rec.stream) Rec.stream.getTracks().forEach(t => t.stop());
  const durationSec = Math.max(1, Math.round((Date.now() - Rec.startedAt) / 1000));
  const out = { blob, transcript: Rec.transcript.trim(), durationSec };
  Rec.mr = null; Rec.stream = null; Rec.chunks = []; Rec.onUpdate = null;
  return out;
}
function discardRecording() { if (Rec.active) stopRecording(); }
const recElapsed = () => { const s = Math.round((Date.now() - Rec.startedAt) / 1000); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; };

/* Local, honest summary — extracted from the transcript, no external service. */
function summarizeTranscript(text, { contactName: who, durationSec, outcome } = {}) {
  const clean = nz(text).replace(/\s+/g, ' ').trim();
  if (!clean) return '';
  const sentences = clean.split(/(?<=[.!?])\s+|\n+/).map(s => s.trim()).filter(s => s.length > 8);
  const ACTION = /(follow.?up|send|email|forward|meeting|book|schedule|call.?back|circle back|next (week|month|monday|tuesday|wednesday|thursday|friday)|tomorrow|proposal|quote|pricing|demo|introduc|connect (me|you|us)|reach out)/i;
  const INTEREST = /(interested|not interested|makes sense|sounds good|already (have|use|working)|budget|timeline|priority|concern)/i;
  const actions = [...new Set(sentences.filter(s => ACTION.test(s)))].slice(0, 3);
  const signals = [...new Set(sentences.filter(s => INTEREST.test(s) && !actions.includes(s)))].slice(0, 2);
  const mins = Math.floor((durationSec || 0) / 60), secs = (durationSec || 0) % 60;
  const lines = [];
  lines.push(`Conversation${who ? ' with ' + who : ''} · ${mins ? mins + ' min ' : ''}${secs}s · ~${clean.split(' ').length} words${outcome ? ' · ' + outcome : ''}`);
  if (signals.length) lines.push('Signals: ' + signals.map(s => '“' + s.replace(/[.!?]$/, '') + '”').join(' · '));
  if (actions.length) lines.push('Next steps heard: ' + actions.map(s => '“' + s.replace(/[.!?]$/, '') + '”').join(' · '));
  if (!signals.length && !actions.length) {
    lines.push('Opening: “' + sentences[0].slice(0, 110) + '”');
    if (sentences.length > 1) lines.push('Closing: “' + sentences[sentences.length - 1].slice(0, 110) + '”');
  }
  return lines.join('\n');
}

  await idbPut('recordings', rec);
  return rec.id;
}

/* Next Meaningful Action: a first-class field, falling back to the most recent

function nextActionOf(c) {
  if (nz(c.nextAction)) return c.nextAction;
  const acts = State.activities.filter(a => a.contactId === c.id && a.meta && nz(a.meta.nextAction));
  return acts.length ? acts[acts.length - 1].meta.nextAction : '';
}
const primaryPhone = c => nz(c.directPhone) || nz(c.mobilePhone) || nz(c.companyPhone);
const hasPhone = c => validPhone(c.directPhone) || validPhone(c.mobilePhone) || validPhone(c.companyPhone);
const contactName = c => nz(c.fullName) || `${nz(c.firstName)} ${nz(c.lastName)}`.trim() || '(No name)';
const accountName = a => nz(a.name) || '(Unknown company)';

const initials = s => nz(s).split(/\s+/).filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('') || '?';

/* ===== 7. Import pipeline ============================================== */
const Import = { step: 0, file: null, parsed: null, mapping: {}, items: null, stats: null, listMeta: {} };

function autoMap(headers) {
  const norm = h => h.toLowerCase().replace(/[^a-z0-9]/g, '');
  const normHeaders = headers.map(h => ({ h, n: norm(h) }));
  const used = new Set(); const map = {};
  // exact pass then contains pass, honoring CANON priority order
  for (const pass of ['exact', 'contains']) {
    for (const f of CANON) {
      if (map[f.key]) continue;
      const syns = SYN[f.key] || [];
      for (const syn of syns) {
        const hit = normHeaders.find(x => !used.has(x.h) && (pass === 'exact' ? x.n === syn : x.n.includes(syn)));
        if (hit) { map[f.key] = hit.h; used.add(hit.h); break; }
      }
    }
  }
  return map;
}
/* build a staged contact object from a raw row using the mapping */
function stageRow(row, map) {
  const g = k => map[k] ? nz(row[map[k]]) : '';
  const first = g('firstName'), last = g('lastName');
  let full = g('fullName'); if (!full) full = `${first} ${last}`.trim();
  const s = {
    companyName: g('companyName'), companyWebsite: g('companyWebsite'),
    firstName: first, lastName: last, fullName: full,
    jobTitle: g('jobTitle'), department: g('department'), jobFunction: g('jobFunction'), seniority: g('seniority'),
    directPhone: g('directPhone'), mobilePhone: g('mobilePhone'), companyPhone: g('companyPhone'),
    email: g('email'), linkedin: g('linkedin'), industry: g('industry'),
    employeeCount: g('employeeCount'), revenue: g('revenue'),
    street: g('street'), city: g('city'), state: g('state'), country: g('country'),
    postalCode: g('postalCode'), timezone: g('timezone'), notes: g('notes'),
  };
  s.domain = domainOf(s.companyWebsite, s.email);
  s.accountKeyName = companyKey(s.companyName);
  s.accountKey = s.domain || s.accountKeyName || '';
  s.nameKey = nameKeyOf(s.fullName);
  s.emailKey = emailKeyOf(s.email);
  s.linkedinKey = linkedinKeyOf(s.linkedin);
  s.phoneKeys = [phoneKeyOf(s.directPhone), phoneKeyOf(s.mobilePhone)].filter(Boolean); // exclude company main line
  return s;
}
/* Analyze: stage all rows, detect duplicates within-file and vs DB. */
function analyzeImport() {
  const map = Import.mapping;
  const rows = Import.parsed.rows;
  // build DB indexes
  const dbEmail = new Map(), dbLinked = new Map(), dbPhone = new Map(), dbNameCo = new Map();
  const dbByAccount = new Map();
  for (const c of State.contacts) {
    const ek = emailKeyOf(c.email); if (ek) dbEmail.set(ek, c);
    const lk = linkedinKeyOf(c.linkedin); if (lk) dbLinked.set(lk, c);
    [phoneKeyOf(c.directPhone), phoneKeyOf(c.mobilePhone)].filter(Boolean).forEach(pk => dbPhone.set(pk, c));
    const acc = accountOf(c);
    const aKey = acc ? (acc.domain || acc.nameKey) : '';
    if (c.nameKey) dbNameCo.set(c.nameKey + '@' + aKey, c);
    if (aKey) { if (!dbByAccount.has(aKey)) dbByAccount.set(aKey, []); dbByAccount.get(aKey).push(c); }
  }
  // seen within-file
  const seenEmail = new Map(), seenLinked = new Map(), seenPhone = new Map(), seenNameCo = new Map();
  const byAccountFile = new Map();
  const items = [];
  let companies = new Set();
  rows.forEach((row, idx) => {
    const st = stageRow(row, map);
    if (st.accountKey) companies.add(st.accountKey);
    const item = { idx, staged: st, action: 'import', dup: { level: 'none' }, account: null };
    // account preview
    const dbAcc = findAccountByKeys(st.domain, st.accountKeyName);
    if (dbAcc) item.account = { status: 'existing', id: dbAcc.id, name: dbAcc.name };
    else if (byAccountFile.has(st.accountKey)) item.account = { status: 'new-file', name: st.companyName };
    else item.account = { status: 'new', name: st.companyName };

    // ---- duplicate classification (first match wins by strength) ----
    let dup = null;
    // exact vs DB
    if (st.emailKey && dbEmail.has(st.emailKey)) dup = { level: 'exact', kind: 'db', matchType: 'email', existingId: dbEmail.get(st.emailKey).id, reason: 'Same email address' };
    else if (st.linkedinKey && dbLinked.has(st.linkedinKey)) dup = { level: 'exact', kind: 'db', matchType: 'linkedin', existingId: dbLinked.get(st.linkedinKey).id, reason: 'Same LinkedIn URL' };
    else if (st.phoneKeys.some(pk => dbPhone.has(pk))) { const pk = st.phoneKeys.find(pk => dbPhone.has(pk)); const o = dbPhone.get(pk); const sameName = st.nameKey && o.nameKey && ratio(st.nameKey, o.nameKey) >= 0.72; dup = { level: sameName ? 'exact' : 'possible', kind: 'db', matchType: 'phone', existingId: o.id, reason: sameName ? 'Same phone + matching name' : 'Shares a phone number (possibly a shared company line)' }; }
    else if (st.nameKey && dbNameCo.has(st.nameKey + '@' + st.accountKey)) dup = { level: 'exact', kind: 'db', matchType: 'name+company', existingId: dbNameCo.get(st.nameKey + '@' + st.accountKey).id, reason: 'Same name at same company' };
    // exact vs earlier row in file
    if (!dup) {
      if (st.emailKey && seenEmail.has(st.emailKey)) dup = { level: 'exact', kind: 'file', matchType: 'email', refIdx: seenEmail.get(st.emailKey), reason: 'Same email earlier in this file' };
      else if (st.linkedinKey && seenLinked.has(st.linkedinKey)) dup = { level: 'exact', kind: 'file', matchType: 'linkedin', refIdx: seenLinked.get(st.linkedinKey), reason: 'Same LinkedIn earlier in this file' };
      else if (st.phoneKeys.some(pk => seenPhone.has(pk))) { const pk = st.phoneKeys.find(pk => seenPhone.has(pk)); const ri = seenPhone.get(pk); const on = items[ri].staged.nameKey; const sameName = st.nameKey && on && ratio(st.nameKey, on) >= 0.72; dup = { level: sameName ? 'exact' : 'possible', kind: 'file', matchType: 'phone', refIdx: ri, reason: sameName ? 'Same phone + name earlier in file' : 'Shares a phone number earlier in file (possibly a shared line)' }; }
      else if (st.nameKey && seenNameCo.has(st.nameKey + '@' + st.accountKey)) dup = { level: 'exact', kind: 'file', matchType: 'name+company', refIdx: seenNameCo.get(st.nameKey + '@' + st.accountKey), reason: 'Same name+company earlier in this file' };
    }
    // possible: similar name at same account (DB then file)
    if (!dup && st.nameKey && st.accountKey) {
      const cand = (dbByAccount.get(st.accountKey) || []);
      for (const c of cand) {
        const r = ratio(st.nameKey, c.nameKey || '');
        if (r >= 0.72 && r < 1) { dup = { level: 'possible', kind: 'db', matchType: 'similar-name', existingId: c.id, reason: `Similar name at same company (${Math.round(r*100)}% match to "${contactName(c)}")` }; break; }
      }
      if (!dup) {
        const fcand = (byAccountFile.get(st.accountKey) || []);
        for (const fi of fcand) {
          const r = ratio(st.nameKey, items[fi].staged.nameKey || '');
          if (r >= 0.72 && r < 1) { dup = { level: 'possible', kind: 'file', matchType: 'similar-name', refIdx: fi, reason: `Similar name earlier in file (${Math.round(r*100)}% match)` }; break; }
        }
      }
    }
    // possible: company variation (fuzzy account, distinct company row)
    if (!dup && item.account.status !== 'existing' && st.accountKeyName) {
      const near = State.accounts.find(a => a.nameKey && a.nameKey !== st.accountKeyName && ratio(a.nameKey, st.accountKeyName) >= 0.85);
      if (near) item.account.note = `Possible company-name variation of "${near.name}"`;
    }

    if (dup) {
      item.dup = dup;
      item.action = dup.level === 'exact' ? 'merge' : 'keep_separate';
    }
    items.push(item);
    // record seen
    if (st.emailKey) seenEmail.set(st.emailKey, idx);
    if (st.linkedinKey) seenLinked.set(st.linkedinKey, idx);
    st.phoneKeys.forEach(pk => seenPhone.set(pk, idx));
    if (st.nameKey) seenNameCo.set(st.nameKey + '@' + st.accountKey, idx);
    if (st.accountKey) { if (!byAccountFile.has(st.accountKey)) byAccountFile.set(st.accountKey, []); byAccountFile.get(st.accountKey).push(idx); }
  });
  // stats
  const staged = items.map(i => i.staged);
  const stats = {
    rows: rows.length,
    companies: companies.size,
    contacts: staged.filter(s => nz(s.fullName)).length,
    phones: staged.filter(s => validPhone(s.directPhone) || validPhone(s.mobilePhone) || validPhone(s.companyPhone)).length,
    emails: staged.filter(s => validEmail(s.email)).length,
    linkedins: staged.filter(s => validLinkedin(s.linkedin)).length,
    exact: items.filter(i => i.dup.level === 'exact').length,
    possible: items.filter(i => i.dup.level === 'possible').length,
    missing: staged.filter(s => !nz(s.fullName) || !nz(s.companyName) || !hasPhone(s)).length,
    errors: staged.filter(s => !nz(s.fullName) && !nz(s.companyName)).length,
  };
  Import.items = items; Import.stats = stats;
  return { items, stats };
}

async function commitImport() {
  const now = nowISO();
  const meta = Import.listMeta;
  const list = {
    id: uid(), name: meta.name || 'Untitled list', description: meta.description || '', source: meta.source || '',
    fileName: Import.file ? Import.file.name : '', importedAt: now,
    columnMapping: { ...Import.mapping }, stats: null,
  };
  State.lists.push(list); await idbPut('lists', list);

  const acctByKey = new Map(); // key -> account (existing or new this import)
  const itemContactId = {}; // idx -> contactId created
  const newAccounts = [], newContacts = [], updatedContacts = [], updatedAccounts = [];
  const c = { created: 0, merged: 0, replaced: 0, skipped: 0, separate: 0, accounts: 0 };

  function resolveAccount(st) {
    const key = st.accountKey || ('name:' + st.accountKeyName) || ('row:' + uid());
    if (acctByKey.has(key)) return acctByKey.get(key);
    let acc = findAccountByKeys(st.domain, st.accountKeyName);
    if (acc) { if (!acc.sourceListIds.includes(list.id)) { acc.sourceListIds.push(list.id); acc.updatedAt = now; updatedAccounts.push(acc); } }
    else { acc = newAccountFrom(st, list.id); State.accounts.push(acc); newAccounts.push(acc); c.accounts++; }
    acctByKey.set(key, acc);
    return acc;
  }
  function mergeInto(existing, st, mode) {
    // Merge = keep most-recent info (spec): newer value wins when present, existing kept where the
    // new value is blank — so a populated field is never lost to a blank. Replace = take the new row
    // wholesale (may blank fields). Both preserve notes/call history/follow-ups/source lists, and
    // every field change is logged so nothing is overwritten silently.
    const F = [['firstName','First name'],['lastName','Last name'],['fullName','Name'],['department','Department'],['jobFunction','Function'],['seniority','Seniority'],['directPhone','Direct phone'],['mobilePhone','Mobile'],['companyPhone','Company phone'],['email','Email'],['linkedin','LinkedIn']];
    const replace = mode === 'replace';
    const changes = [];
    const put = (k, label, sv) => {
      const cur = existing[k];
      const write = replace ? (sv !== cur) : (nz(sv) && sv !== cur);
      if (!write) return;
      if (nz(cur)) changes.push(`${label} "${cur}"→"${nz(sv) ? sv : '(blank)'}"`);
      existing[k] = sv;
    };
    F.forEach(([k, label]) => put(k, label, st[k]));
    put('title', 'Title', st.jobTitle);
    existing.nameKey = nameKeyOf(existing.fullName);
    if (nz(st.notes)) existing.notes = nz(existing.notes) ? existing.notes + '\n' + st.notes : st.notes;
    if (!existing.sourceListIds.includes(list.id)) existing.sourceListIds.push(list.id);
    existing.updatedAt = now;
    updatedContacts.push(existing);
    logActivity('merge', { contactId: existing.id, accountId: existing.accountId,
      notes: `${replace ? 'Replaced' : 'Merged'} from import "${list.name}"${changes.length ? ' · ' + changes.join(', ') : ''}`,
      meta: { listId: list.id, mode } });
    return existing;
  }

  for (const item of Import.items) {
    const st = item.staged;
    const action = item.action;
    if (action === 'skip' || action === 'keep_existing') {
      c.skipped++;
      // still record list membership on the matched existing contact, and point later
      // file-duplicates at the same target so they don't leak through as new contacts.
      if (item.dup.kind === 'db' && item.dup.existingId) {
        itemContactId[item.idx] = item.dup.existingId;
        const ex = State.byId('contacts', item.dup.existingId);
        if (ex && !ex.sourceListIds.includes(list.id)) { ex.sourceListIds.push(list.id); ex.updatedAt = now; updatedContacts.push(ex); logActivity('import', { contactId: ex.id, accountId: ex.accountId, notes: `Appeared again in import "${list.name}" (kept existing)`, meta: { listId: list.id } }); }
      } else if (item.dup.kind === 'file' && item.dup.refIdx != null && itemContactId[item.dup.refIdx] != null) {
        itemContactId[item.idx] = itemContactId[item.dup.refIdx];
      }
      continue;
    }
    // target existing?
    let existing = null;
    if ((action === 'merge' || action === 'replace')) {
      if (item.dup.kind === 'db' && item.dup.existingId) existing = State.byId('contacts', item.dup.existingId);
      else if (item.dup.kind === 'file' && item.dup.refIdx != null) { const cid = itemContactId[item.dup.refIdx]; existing = cid ? State.byId('contacts', cid) : null; }
    }
    if (existing) {
      // ensure account link too
      resolveAccount(st);
      mergeInto(existing, st, action);
      itemContactId[item.idx] = existing.id;
      if (action === 'replace') c.replaced++; else c.merged++;
      continue;
    }
    // create new (import / import as separate)
    const acc = resolveAccount(st);
    const contact = contactFrom(st, acc.id, list.id);
    State.contacts.push(contact); newContacts.push(contact);
    itemContactId[item.idx] = contact.id;
    if (action === 'keep_separate' || (item.dup.level !== 'none')) c.separate++; else c.created++;
    logActivity('contact_created', { contactId: contact.id, accountId: acc.id, notes: `Imported from "${list.name}"`, meta: { listId: list.id }, contactZone: contact.timezone });
  }
  // persist
  await idbBulk('accounts', dedupeById([...newAccounts, ...updatedAccounts]));
  await idbBulk('contacts', dedupeById([...newContacts, ...updatedContacts]));
  list.stats = { ...Import.stats, imported: c.created + c.separate, merged: c.merged, replaced: c.replaced, skipped: c.skipped, accountsCreated: c.accounts };
  await idbPut('lists', list);
  await logActivity('import', { notes: `Imported list "${list.name}": ${c.created + c.separate} contacts, ${c.accounts} accounts, ${c.merged + c.replaced} merged, ${c.skipped} skipped`, meta: { listId: list.id, counts: c } });
  return { list, counts: c };
}
function dedupeById(arr){ const m = new Map(); arr.forEach(x => m.set(x.id, x)); return Array.from(m.values()); }

/* ===== 8. Router ======================================================= */
const Routes = {};
function route(path, fn){ Routes[path] = fn; }
function navigate(hash){ if (location.hash === hash) render(); else location.hash = hash; }
function currentRoute() {
  const h = location.hash.replace(/^#/, '') || '/home';
  const [path, ...rest] = h.split('/').filter(Boolean);
  return { name: '/' + (path || 'home'), param: rest.join('/') };
}
function render() {
  if (typeof closeDrawer === 'function') closeDrawer();
  if (typeof closePalette === 'function') closePalette();
  const { name, param } = currentRoute();
  State.route = name;
  const view = $('#view');
  const topbar = $('#topbar');
  topbar.hidden = (name === '/home' && !State.lists.length && !State.contacts.length) ? false : false;
  topbar.hidden = false;
  $$('#topnav button');
  $$('.topnav button').forEach(b => b.classList.toggle('active', b.dataset.nav === '#' + name || (name.startsWith('/rolodex') && b.dataset.nav === '#/rolodex')));
  const fn = Routes[name] || Routes['/home'];
  view.scrollTo?.(0, 0);
  fn(view, param);
  updateResumePill();
}
function updateResumePill() {
  const pill = $('#resume-pill');
  const s = State.sessions.filter(x => x.status === 'active').sort((a,b) => b.updatedAt.localeCompare(a.updatedAt))[0];
  if (s && s.cursor < s.queue.length) {
    pill.hidden = false;
    pill.innerHTML = `${icon('play')} Resume session <span class="num">${s.cursor}/${s.queue.length}</span>`;
    pill.onclick = () => { State.session = s; navigate('#/call'); };
  } else pill.hidden = true;
}

async function seedSample() {
  try {
    // Hosted/single-file builds embed the sample; the local dev copy fetches it.
    let text = window.ROLODESK_SAMPLE_CSV;
    if (!text) {
      const res = await fetch('data/sample-zoominfo-export.csv');
      if (!res.ok) throw new Error('sample not found');
      text = await res.text();
    }
    const file = new File([text], 'sample-zoominfo-export.csv', { type: 'text/csv' });
    startImport(file);
  } catch { toast('Open the app via a local server to load the sample, or use Upload New List.', 'bad'); }
}

async function startImport(file) {
  resetImport();
  Import.file = file;
  toast('Reading ' + file.name + '…');
  try {
    const parsed = await parseFile(file);
    if (!parsed.rows.length) { toast('That file has no data rows.', 'bad'); resetImport(); return; }
    Import.parsed = parsed;
    Import.mapping = autoMap(parsed.headers);
    Import.step = 1;
    // default list name from filename
    Import.listMeta = { name: prettyListName(file.name), description: '', source: 'ZoomInfo export' };
    navigate('#/upload');
  } catch (e) { toast(e.message || 'Could not read file', 'bad'); resetImport(); render(); }
}
function prettyListName(fn){ return fn.replace(/\.[^.]+$/, '').replace(/[_-]+/g, ' ').replace(/\b\w/g, m => m.toUpperCase()).trim(); }
function resetImport(){ Object.assign(Import, { step: 0, file: null, parsed: null, mapping: {}, items: null, stats: null, listMeta: {} }); }

function renderStepDupes(w) {
  if (!Import.items) analyzeImport();
  const items = Import.items;
  const exact = items.filter(i => i.dup.level === 'exact');
  const possible = items.filter(i => i.dup.level === 'possible');
  const clean = items.filter(i => i.dup.level === 'none');
  w.innerHTML = `
    <p class="soft" style="margin-top:0">We found <b>${exact.length}</b> exact and <b>${possible.length}</b> possible duplicates among <b>${items.length}</b> rows. Nothing is auto-deleted — choose what to do with each. Defaults are pre-selected.</p>
    ${dupGroup('Exact duplicates', exact, 'exact', ['merge','replace','keep_separate','keep_existing','skip'])}
    ${dupGroup('Possible duplicates', possible, 'possible', ['keep_separate','merge','keep_existing','skip'])}
    <div class="section-title">New, unique contacts <span class="pill-count">${clean.length}</span></div>
    <p class="hint">${clean.length} rows have no duplicate and will be imported as new contacts.</p>
    <div class="row" style="justify-content:space-between;margin-top:20px">

const ACTION_LABEL = { merge:'Merge', replace:'Replace', keep_separate:'Import separate', import:'Import', keep_existing:'Keep existing', skip:'Skip' };
function dupGroup(title, list, cls, actions) {
  if (!list.length) return `<div class="section-title">${title} <span class="pill-count" style="background:var(--line-strong);color:var(--ink-soft)">0</span></div><p class="hint">None found.</p>`;
  return `<div class="section-title">${title} <span class="pill-count">${list.length}</span>
      <button class="btn sm ghost" data-bulk="${cls}" style="margin-left:8px">Set all…</button></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>New row</th><th>Matches</th><th>Why</th><th style="width:150px">Action</th></tr></thead>
    <tbody>
      ${list.map(it => {
        const match = it.dup.kind === 'db' ? existingLabel(it.dup.existingId) : (it.dup.refIdx!=null?`Row ${it.dup.refIdx+2} in this file`:'—');
        return `<tr data-idx="${it.idx}">
          <td><b>${esc(contactName(it.staged))}</b><div class="hint">${esc(it.staged.companyName)} · ${esc(it.staged.jobTitle)}</div></td>
          <td>${esc(match)}</td>
          <td><span class="badge ${cls}">${esc(it.dup.reason)}</span></td>
          <td><select data-action="${it.idx}">${actions.map(a=>`<option value="${a}" ${it.action===a?'selected':''}>${ACTION_LABEL[a]}</option>`).join('')}</select></td>
        </tr>`; }).join('')}
    </tbody></table></div>`;
}
function existingLabel(id){ const c = State.byId('contacts', id); if (!c) return 'existing contact'; const a = accountOf(c); return `${contactName(c)} · ${a?accountName(a):''}`; }
function bindDupActions(w) {
  $$('select[data-action]', w).forEach(sel => sel.onchange = () => { const it = Import.items.find(i => i.idx == sel.dataset.action); it.action = sel.value; });
  $$('[data-bulk]', w).forEach(btn => btn.onclick = () => {
    const cls = btn.dataset.bulk;
    const actions = cls === 'exact' ? ['merge','replace','keep_separate','keep_existing','skip'] : ['keep_separate','merge','keep_existing','skip'];
    const m = modal({ title: 'Set all ' + cls + ' duplicates to…', body:
      `<div class="chips">${actions.map(a=>`<button class="chip" data-a="${a}">${ACTION_LABEL[a]}</button>`).join('')}</div>` });
    $$('[data-a]', m.root).forEach(b => b.onclick = () => {
      Import.items.filter(i => i.dup.level === cls).forEach(i => i.action = b.dataset.a);
      m.close(); render();
    });
  });
}

function filterActs(){ let a = State.activities.slice(); a = scopeByList(a); return a.filter(x => inRange(x.at)); }
function scopeByList(acts){ if (!DashState.listId) return acts; const ids = new Set(State.contacts.filter(c=>(c.sourceListIds||[]).includes(DashState.listId)).map(c=>c.id)); return acts.filter(a => !a.contactId || ids.has(a.contactId)); }
function scopeContacts(){ return DashState.listId ? State.contacts.filter(c=>(c.sourceListIds||[]).includes(DashState.listId)) : State.contacts; }
function inRange(iso){ if (DashState.range==='all') return true; if (DashState.range==='today') return isToday(iso); if (DashState.range==='week') return isThisWeek(iso); if (DashState.range==='month') return isThisMonth(iso); return true; }

function bindFilterBar(scope) {
  const f = RolState.filters;
  const rerender = debounce(render, 220);
  const s = $('#f-search', scope); if (s) s.oninput = e => { f.q = e.target.value; rerender(); };
  const bind = (id, key) => { const el = $('#'+id, scope); if (el) el.onchange = e => { f[key] = e.target.value; render(); }; };
  bind('f-status','status'); bind('f-priority','priority'); bind('f-seniority','seniority'); bind('f-industry','industry'); bind('f-state','state');
  const fl = $('#f-list', scope); if (fl) fl.onchange = e => { RolState.listId = e.target.value; render(); };
  $$('[data-quick]', scope).forEach(b => b.onclick = () => { f.quick = f.quick === b.dataset.quick ? '' : b.dataset.quick; render(); });
  const rb = $('#f-reset', scope); if (rb) rb.onclick = () => { RolState.filters = {}; RolState.listId=''; render(); };
}
function applyFilters(contacts, f) {
  let out = contacts.slice();
  if (RolState.listId) out = out.filter(c => (c.sourceListIds||[]).includes(RolState.listId));
  if (f.status) out = out.filter(c => c.status === f.status);
  if (f.priority) out = out.filter(c => (c.priority||'Medium') === f.priority);
  if (f.seniority) out = out.filter(c => c.seniority === f.seniority);
  if (f.industry) out = out.filter(c => { const a = accountOf(c); return a && a.industry === f.industry; });
  if (f.state) out = out.filter(c => (c.state || (accountOf(c)||{}).state) === f.state);
  if (f.quick) out = out.filter(c => quickMatch(c, f.quick));
  if (nz(f.q)) { const q = f.q.toLowerCase(); out = out.filter(c => searchBlob(c).includes(q)); }
  return out;
}
function quickMatch(c, q) {
  switch (q) {
    case 'never': return !c.lastContactedAt;
    case 'today': return isToday(c.lastContactedAt);
    case 'week': return isThisWeek(c.lastContactedAt);
    case 'due_today': return isToday(c.nextFollowUpAt);
    case 'overdue': return c.nextFollowUpAt && new Date(c.nextFollowUpAt) < new Date() && c.status!=='Completed';
    case 'no_fup': return !c.nextFollowUpAt;
    case 'inwindow': { const z = resolveZone(c); const p = zoneParts(z.zone); return callBand(p.hour,p.minute,State.settings.preferredCallWindow).key==='good'; }
    case 'hot': return c.interest === 'Hot';
    default: return true;
  }
}
function searchBlob(c) {
  const a = accountOf(c);
  const acts = activitiesForContact(c.id).map(x => `${x.outcome||''} ${x.notes||''}`).join(' ');
  const lists = (c.sourceListIds||[]).map(listName).join(' ');
  return [contactName(c), c.title, c.department, c.email, c.linkedin, primaryPhone(c), c.directPhone, c.mobilePhone,
    a?a.name:'', a?a.industry:'', c.lastOutcome, acts, lists].map(x=>nz(x)).join(' ').toLowerCase();
}

/* ===== 11. Calendar (ics + google) ==================================== */
function icsFor(f, c) {
  const a = accountOf(c);
  const dt = s => new Date(s).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const end = new Date(new Date(f.dueAt).getTime()+30*60000).toISOString();
  const desc = calDescription(f, c, a).replace(/\n/g,'\\n');
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Rolodesk//EN','BEGIN:VEVENT',
    'UID:'+f.id+'@rolodesk','DTSTAMP:'+dt(nowISO()),'DTSTART:'+dt(f.dueAt),'DTEND:'+dt(end),
    'SUMMARY:'+icsEsc(`Follow up with ${contactName(c)} at ${a?accountName(a):''}`),
    'DESCRIPTION:'+icsEsc(desc),'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
const icsEsc = s => String(s).replace(/([,;])/g,'\\$1');
function calDescription(f, c, a) {
  return [`Contact: ${contactName(c)} — ${or(c.title,'')}`,
    `Company: ${a?accountName(a):''}`, `Phone: ${primaryPhone(c)||'—'}`, `Email: ${c.email||'—'}`,
    `LinkedIn: ${c.linkedin||'—'}`, `Previous outcome: ${c.lastOutcome||'—'}`,
    `Latest notes: ${(c.notes||'').slice(0,200)||'—'}`, `Reason: ${f.reason||'Follow-up'}`,
    `Planned next action: ${f.plannedAction||'—'}`].join('\n');
}
function googleCalUrl(f, c) {
  const a = accountOf(c);
  const dt = s => new Date(s).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const end = new Date(new Date(f.dueAt).getTime()+30*60000).toISOString();
  const p = new URLSearchParams({ action:'TEMPLATE',
    text:`Follow up with ${contactName(c)} at ${a?accountName(a):''}`,
    dates:`${dt(f.dueAt)}/${dt(end)}`, details: calDescription(f, c, a) });
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}
function openCalendar(f) {
  const c = State.byId('contacts', f.contactId); if (!c) return;
  const blob = new Blob([icsFor(f, c)], { type:'text/calendar' });
  const url = URL.createObjectURL(blob);
  const m = modal({ title:'Add follow-up to calendar', body:`
    <p style="margin-top:0">Follow-up with <b>${esc(contactName(c))}</b> on <b>${esc(fmtDateTime(f.dueAt))}</b>.</p>
    <div class="row wrap" style="gap:10px;margin-top:12px">
      <a class="btn primary" href="${url}" download="followup-${esc(contactName(c)).replace(/\s+/g,'-')}.ics">${icon('download')} Download .ics</a>
      <a class="btn" href="${esc(googleCalUrl(f,c))}" target="_blank" rel="noopener">${icon('calendar')} Add to Google Calendar</a>
    </div>
    <p class="hint" style="margin-top:14px">The .ics opens in Apple Calendar / Outlook. Description is pre-filled with role, phone, email, LinkedIn, previous outcome, notes, and the planned next action.</p>` });
}

async function updateContact(c, patch, { silent } = {}) {
  const changedStatus = patch.status && patch.status !== c.status;

  await idbPut('contacts', c);
  if (changedStatus && !silent) logActivity('status_change', { contactId:c.id, accountId:c.accountId, notes:`Status → ${patch.status}` });
  if (!silent) toast('Saved','good');
}
async function updateAccount(a, patch) { Object.assign(a, patch, { updatedAt: nowISO() }); await idbPut('accounts', a); }
