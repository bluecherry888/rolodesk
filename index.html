async function createFollowup(c, { dueAt, reminder, reason, plannedAction }) {
  const f = { id:uid(), contactId:c.id, accountId:c.accountId, dueAt, timezone:State.settings.userTimezone, reminder:reminder||'At time of event', reason:reason||'Follow-up', plannedAction:plannedAction||'', status:'scheduled', calendarLinked:false, createdAt:nowISO(), updatedAt:nowISO() };
  State.followups.push(f); await idbPut('followups', f);
  // nextFollowUpAt tracks the EARLIEST scheduled follow-up; don't let a later one hide a sooner callback.
  const fupPatch = {};
  if (!c.nextFollowUpAt || dueAt < c.nextFollowUpAt) fupPatch.nextFollowUpAt = dueAt;
  if (nz(plannedAction)) fupPatch.nextAction = plannedAction;
  if (Object.keys(fupPatch).length) await updateContact(c, fupPatch, { silent:true });
  const a = accountOf(c); if (a && (!a.nextFollowUpAt || dueAt < a.nextFollowUpAt)) await updateAccount(a, { nextFollowUpAt: dueAt });
  await logActivity('followup_created', { contactId:c.id, accountId:c.accountId, notes:`Follow-up ${fmtDateTime(dueAt)}${plannedAction?' · '+plannedAction:''}`, meta:{ followupId:f.id, nextAction:plannedAction } });
  return f;
}
async function completeFollowup(id) {
  const f = State.byId('followups', id); if (!f) return;
  f.status = 'done'; f.updatedAt = nowISO(); await idbPut('followups', f);
  const c = State.byId('contacts', f.contactId);
  if (c) { const next = State.followups.filter(x=>x.contactId===c.id&&x.status==='scheduled').sort((a,b)=>a.dueAt.localeCompare(b.dueAt))[0]; await updateContact(c, { nextFollowUpAt: next?next.dueAt:null }, { silent:true }); }
  logActivity('followup_changed', { contactId:f.contactId, accountId:f.accountId, notes:'Follow-up marked done' });
  toast('Follow-up completed','good'); render();
}

          <span class="eyebrow">Reach them</span>
          <div class="drawer-kv">
            ${primaryPhone(c) ? `<div><b>${esc(primaryPhone(c))}</b> · their local time ${esc(zoneTimeStr(z.zone))}</div>` : '<div>No phone on file</div>'}
            ${c.email ? `<div><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></div>` : ''}
            ${c.linkedin ? `<div><a href="${esc(fixUrl(c.linkedin))}" target="_blank" rel="noopener">LinkedIn profile</a></div>` : ''}
          </div>
        </div>
        ${nz(c.intention) || nz(c.notes) ? `<div class="drawer-sec">
          <span class="eyebrow">Pinned context</span>
          <div class="drawer-kv">${nz(c.intention) ? `<div style="font-family:var(--font-display);font-style:italic">${esc(c.intention)}</div>` : ''}${nz(c.notes) ? `<div style="white-space:pre-wrap;margin-top:4px">${esc(c.notes.slice(0, 300))}</div>` : ''}</div>
        </div>` : ''}
        <div class="drawer-sec">
          <span class="eyebrow">Recent history</span>
          ${recent.length ? recent.map(x => `<div class="drawer-kv" style="margin-bottom:8px"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-tertiary)">${esc(fmtDate(x.at))}${x.outcome ? ' · ' + esc(x.outcome) : ''}</div>${nz(x.meta && x.meta.summary) ? `<div>${esc(x.meta.summary.split('\n')[0])}</div>` : nz(x.notes) ? `<div>${esc(x.notes.slice(0, 140))}</div>` : ''}</div>`).join('')
          : '<div class="drawer-kv" style="font-family:var(--font-display);font-style:italic">Your relationship history begins here.</div>'}
        </div>
        <div class="drawer-actions">
          ${hasPhone(c) && !c.doNotContact ? `<button class="btn primary" data-dcall>${icon('phone')} Begin Call</button>` : ''}
          <button class="btn" data-dedit>${icon('pen')} Edit</button>
          <button class="btn ghost" data-ddossier>Full dossier ${icon('arrowRight')}</button>
        </div>
      </div>
    </aside>`;
  setTimeout(() => { const d = $('.drawer', root); if (d) d.classList.add('open'); }, 15);
  document.addEventListener('keydown', _drawerKey);
  $$('[data-dclose]', root).forEach(el => el.onclick = closeDrawer);
  $('[data-ddossier]', root).onclick = () => { closeDrawer(); navigate('#/contact/' + c.id); };
  $('[data-dedit]', root).onclick = () => { closeDrawer(); editContactDialog(c); };
  const callBtn = $('[data-dcall]', root);
  if (callBtn) callBtn.onclick = () => { closeDrawer(); startSession({ name: 'Call ' + contactName(c), queueIds: [c.id] }); navigate('#/call'); };
  const en = $('[data-editnext]', root);
  if (en) en.onclick = async () => {
    const m = modal({ title: 'Next meaningful action — ' + contactName(c), body: `
      <div class="field"><label>What does this relationship need next?</label>
      <input id="na-text" value="${esc(nextActionOf(c))}" placeholder="e.g. Send calendar invitation · Call after vacation · No further action"></div>`,
      footer: `<button class="btn ghost" data-cancel>Cancel</button><button class="btn primary" data-save>Save</button>` });
    $('[data-cancel]', m.root).onclick = m.close;
    $('[data-save]', m.root).onclick = async () => {
      await updateContact(c, { nextAction: nz($('#na-text', m.root).value) }, { silent: true });
      m.close(); toast('Saved', 'good'); render(); openDrawer(c.id);
    };
  };
}

/* ===== command palette ================================================ */
function closePalette() { const r = $('#palette-root'); if (r) r.innerHTML = ''; }
function openPalette() {
  const root = $('#palette-root');
  if (root.children.length) return closePalette();
  const actions = [
    { label: 'Continue calling', icon: 'phone', run: () => { const s = State.sessions.filter(x=>x.status==='active').sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt))[0]; if (s) { State.session = s; navigate('#/call'); } else navigate('#/rolodex'); } },
    { label: 'View overdue follow-ups', icon: 'calendar', run: () => { RolState.filters = { quick: 'overdue' }; RolState.view = 'contacts'; navigate('#/rolodex'); } },
    { label: "Open today's relationships", icon: 'clock', run: () => { RolState.filters = { quick: 'due_today' }; RolState.view = 'contacts'; navigate('#/rolodex'); } },
    { label: 'Import a list', icon: 'upload', run: () => navigate('#/upload') },
    { label: 'Open Dashboard', icon: 'users', run: () => navigate('#/dashboard') },
    { label: 'Export backup', icon: 'download', run: () => exportJSON() },
  ];
  root.innerHTML = `
    <div class="palette-scrim" data-pclose>
      <div class="palette" role="dialog" aria-label="Command palette">
        <input id="pal-q" placeholder="Find a person or company, or type a command…" autocomplete="off">
        <div class="palette-list" id="pal-list"></div>
      </div>
    </div>`;
  const q = $('#pal-q', root), list = $('#pal-list', root);
  let items = [], active = 0;
  const paint = () => {
    list.innerHTML = items.length ? items.map((it, i) => `
      <button class="palette-item ${i === active ? 'active' : ''}" data-pi="${i}">${icon(it.icon || 'search')} <span>${esc(it.label)}</span><span class="pi-hint">${esc(it.hint || '')}</span></button>`).join('')
      : '<div class="palette-empty">Nothing matches. Try a name, a company, or a command.</div>';
    $$('[data-pi]', list).forEach(b => b.onclick = () => { const it = items[+b.dataset.pi]; closePalette(); it.run(); });
  };
  const build = (term) => {
    const t = term.trim().toLowerCase();
    const acts = actions.filter(a => !t || a.label.toLowerCase().includes(t));
    let people = [];
    if (t.length >= 2) {
      people = State.contacts.filter(c => contactName(c).toLowerCase().includes(t) || (accountOf(c) && accountName(accountOf(c)).toLowerCase().includes(t)))
        .slice(0, 6).map(c => { const a = accountOf(c); return { label: contactName(c), hint: a ? accountName(a) : '', icon: 'users', run: () => openDrawer(c.id) }; });
    }
    items = [...people, ...acts.slice(0, people.length ? 4 : 8)];
    active = 0; paint();
  };
  q.oninput = () => build(q.value);
  q.onkeydown = e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, items.length - 1); paint(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); paint(); }
    else if (e.key === 'Enter') { e.preventDefault(); const it = items[active]; if (it) { closePalette(); it.run(); } }
    else if (e.key === 'Escape') closePalette();
  };
  $('.palette-scrim', root).addEventListener('mousedown', e => { if (e.target.classList.contains('palette-scrim')) closePalette(); });
  build(''); q.focus();
}

/* ===== sessions / queue =============================================== */
function buildQueue(contacts) {
  const win = State.settings.preferredCallWindow;
  const scored = contacts.filter(c => !c.doNotContact).map(c => {
    const z = resolveZone(c); const p = zoneParts(z.zone); const band = callBand(p.hour,p.minute,win);
    let s = 0;
    if (c.nextFollowUpAt && new Date(c.nextFollowUpAt) < new Date()) s += 1000; // overdue
    if (isToday(c.nextFollowUpAt)) s += 800;
    if (c.priority==='High') s += 300; else if (c.priority==='Medium') s += 100;
    if (band.key==='good') s += 200;
    if (!c.lastContactedAt) s += 60; // never called
    if (/Connected|answered/i.test(c.lastOutcome||'')) s += 40;
    return { c, s };
  });
  scored.sort((a,b) => b.s - a.s);
  return scored.map(x => x.c);
}
function startSession({ listId, name, queueIds, filterSnapshot }) {
  let ids = queueIds;
  if (!ids) { let cs = State.contacts; if (listId) cs = cs.filter(c => (c.sourceListIds||[]).includes(listId)); ids = buildQueue(cs.filter(hasPhone)).map(c=>c.id); }
  const s = { id:uid(), name:name||'Calling session', listId:listId||null, filterSnapshot:filterSnapshot||null, queue:ids, cursor:0, status:'active', createdAt:nowISO(), updatedAt:nowISO() };
  State.sessions.filter(x=>x.status==='active').forEach(x=>{ x.status='paused'; idbPut('sessions', x); });
  State.sessions.push(s); State.session = s; idbPut('sessions', s);
  logActivity('note', { notes:`Started calling session "${s.name}" (${ids.length} contacts)` });
}
function advanceSession(){ const s = State.session; if (!s) return; s.cursor = Math.min(s.cursor+1, s.queue.length); s.updatedAt = nowISO(); saveSession(); }
async function saveSession(){ if (State.session) await idbPut('sessions', State.session); }

/* ===== timeline / activity queries ==================================== */
function activitiesForContact(id){ return State.activities.filter(a => a.contactId === id).sort((a,b)=>a.at.localeCompare(b.at)); }
function activitiesForAccount(id){ return State.activities.filter(a => a.accountId === id).sort((a,b)=>a.at.localeCompare(b.at)); }
const TYPE_ICON = { import:'inbox', contact_created:'sparkle', contact_updated:'pen', call:'phone', note:'note', email:'mail', linkedin:'linkedin', referral:'arrowRight', meeting:'users', followup_created:'calendar', followup_changed:'refresh', status_change:'refresh', merge:'merge', session_complete:'checkCircle' };
const TYPE_LABEL = { import:'List import', contact_created:'Contact created', contact_updated:'Contact updated', call:'Conversation', note:'Note', email:'Email', linkedin:'LinkedIn', referral:'Referral', meeting:'Meeting', followup_created:'Follow-up scheduled', followup_changed:'Follow-up updated', status_change:'Status change', merge:'Records merged', session_complete:'Session complete' };
function renderTimeline(acts) {
  if (!acts.length) return '<p class="hint">Nothing recorded yet — the story of this relationship will build here.</p>';
  const items = acts.slice().reverse();
  return `<div class="timeline">${items.map(a => {
    const dur = a.meta && a.meta.durationSec ? ` · ${Math.round(a.meta.durationSec/60)||'<1'} min` : '';
    const local = a.contactLocalTime ? ` · their local ${esc(a.contactLocalTime)}` : '';
    return `<div class="tl-item"><div class="tl-dot">${icon(TYPE_ICON[a.type]||'note')}</div>
      <div class="tl-head"><span class="tl-type">${esc(TYPE_LABEL[a.type]||a.type)}</span>
        ${a.outcome?`<span class="badge">${esc(a.outcome)}</span>`:''}
        <span class="tl-time">${esc(fmtDateTime(a.at))} (${esc(fmtRelative(a.at))})${dur}</span></div>
      ${a.notes?`<div class="tl-body">${esc(a.notes)}</div>`:''}
      ${a.meta&&a.meta.summary?`<div class="summary-block">${esc(a.meta.summary)}</div>`:''}
      ${a.meta&&a.meta.transcript?`<details class="tl-transcript"><summary>Transcript (${a.meta.transcript.split(/\s+/).length} words)</summary><div class="transcript-full" style="margin-top:8px">${esc(a.meta.transcript)}</div></details>`:''}
      ${a.meta&&a.meta.recordingId?`<div class="audio-row" data-recwrap="${esc(a.meta.recordingId)}"><button class="btn sm" data-playrec="${esc(a.meta.recordingId)}">${icon('play')} Play recording</button></div>`:''}
      ${a.meta&&a.meta.nextAction?`<div class="tl-body"><span class="out">Next:</span> ${esc(a.meta.nextAction)}</div>`:''}
      <div class="hint">${esc(a.actor||'Me')}${a.tzContact?local:''} · ${esc(a.tzUser||'')}</div>
    </div>`; }).join('')}</div>`;
}
/* Narrative relationship history — human events, written as a story.
   Technical record (imports, merges, edits, status changes) lives separately. */
const NARRATIVE_TYPES = ['call','note','email','linkedin','referral','meeting','followup_created','followup_changed'];
function narrativeLine(a) {
  const first = s => nz(s).split('\n')[0];
  switch (a.type) {
    case 'call': {
      const said = first(a.notes) || (a.meta && first(a.meta.summary ? a.meta.summary.split('\n').slice(1).join(' ') : '')) || '';
      return `<b>${a.outcome ? esc(a.outcome) : 'Call placed'}.</b>${said ? ' ' + esc(said) : ''}`;
    }
    case 'note': return esc(first(a.notes));
    case 'followup_created': return `<b>Follow-up set.</b> ${esc(first(a.notes))}`;
    case 'followup_changed': return esc(first(a.notes));
    case 'referral': return `<b>Referral.</b> ${esc(first(a.notes))}`;
    case 'meeting': return `<b>Meeting.</b> ${esc(first(a.notes))}`;
    default: return esc(first(a.notes));
  }
}
function renderNarrative(acts) {
  const items = acts.filter(a => NARRATIVE_TYPES.includes(a.type) && !(a.type === 'call' && a.meta && a.meta.phase === 'attempt')).slice().reverse();
  if (!items.length) return `<p class="soft" style="font-family:var(--font-display);font-style:italic;font-size:15px">Your relationship history begins here.<br><span style="font-size:13px">Notes, calls, emails, and follow-ups will appear as the relationship develops.</span></p>`;
  const method = { call: 'call', note: 'note', email: 'email', linkedin: 'linkedin', referral: 'referral', meeting: 'meeting', followup_created: 'follow-up', followup_changed: 'follow-up' };
  return `<div class="narrative">${items.map(a => {
    const d = new Date(a.at);
    const when = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' }).toUpperCase() + ' · ' + fixMeridiem(d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })).toUpperCase();
    const dur = a.meta && a.meta.durationSec ? ` · ${Math.max(1, Math.round(a.meta.durationSec / 60))} MIN` : '';
    return `<div class="nv-item ${a.type === 'call' ? 'call' : ''}">
      <div class="nv-when">${esc(when)}${dur}<span class="nv-method">· ${esc(method[a.type] || a.type)}</span></div>
      <div class="nv-what">${narrativeLine(a)}</div>
      ${a.meta && a.meta.summary ? `<div class="summary-block">${esc(a.meta.summary)}</div>` : ''}
      ${a.meta && a.meta.transcript ? `<details class="tl-transcript"><summary>Transcript (${a.meta.transcript.split(/\s+/).length} words)</summary><div class="transcript-full" style="margin-top:8px">${esc(a.meta.transcript)}</div></details>` : ''}
      ${a.meta && a.meta.recordingId ? `<div class="audio-row" data-recwrap="${esc(a.meta.recordingId)}"><button class="btn sm" data-playrec="${esc(a.meta.recordingId)}">${icon('play')} Play recording</button></div>` : ''}
      ${a.meta && a.meta.nextAction ? `<div class="nv-what" style="margin-top:4px"><b>Next:</b> ${esc(a.meta.nextAction)}</div>` : ''}
    </div>`; }).join('')}</div>`;
}
/* Load a call recording on demand and swap the button for an audio player. */
function bindRecordingPlayback(scope) {
  $$('[data-playrec]', scope || document).forEach(btn => btn.onclick = async () => {
    const rec = await idbGet('recordings', btn.dataset.playrec);
    if (!rec || !rec.blob) return toast('Recording not found on this device', 'bad');
    const url = URL.createObjectURL(rec.blob);
    const wrap = btn.closest('.audio-row');
    wrap.innerHTML = `<audio controls autoplay src="${url}"></audio>`;
  });
}

/* follow-up helpers */
function followupsDueToday(){ return State.followups.filter(f => f.status==='scheduled' && isToday(f.dueAt)); }
function followupsOverdue(){ return State.followups.filter(f => f.status==='scheduled' && new Date(f.dueAt) < new Date() && !isToday(f.dueAt)); }

/* ===== export / wipe ================================================== */
function download(name, text, type='application/json'){ const b = new Blob([text], { type }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u), 1000); }
function exportJSON(){ const data = { lists:State.lists, accounts:State.accounts, contacts:State.contacts, activities:State.activities, followups:State.followups, sessions:State.sessions, settings:State.settings, exportedAt:nowISO() }; download('rolodesk-backup-'+nowISO().slice(0,10)+'.json', JSON.stringify(data,null,2)); toast('Backup downloaded','good'); }
function exportCSV(){
  const cols = ['fullName','title','company','directPhone','mobilePhone','companyPhone','email','linkedin','status','priority','interest','lastContactedAt','lastOutcome','nextAction','nextFollowUpAt','callCount','intention','notes','lastUpdated','sourceLists'];
  const rows = State.contacts.map(c => { const a = accountOf(c); return { fullName:contactName(c), title:c.title, company:a?a.name:'', directPhone:c.directPhone, mobilePhone:c.mobilePhone, companyPhone:c.companyPhone, email:c.email, linkedin:c.linkedin, status:c.status, priority:c.priority, interest:c.interest, lastContactedAt:c.lastContactedAt||'', lastOutcome:c.lastOutcome||'', nextAction:nextActionOf(c), nextFollowUpAt:c.nextFollowUpAt||'', callCount:c.callCount||0, intention:c.intention||'', notes:c.notes||'', lastUpdated:c.updatedAt||'', sourceLists:(c.sourceListIds||[]).map(listName).join('; ') }; });
  const csv = [cols.join(','), ...rows.map(r => cols.map(k => `"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
  download('rolodesk-contacts-'+nowISO().slice(0,10)+'.csv', csv, 'text/csv'); toast('Contacts exported','good');
}
async function restoreBackup(file) {
  let data;
  try { data = JSON.parse(await file.text()); }
  catch { return toast('That file is not valid JSON.', 'bad'); }
  const stores = ['lists','accounts','contacts','activities','followups','sessions'];
  if (!data || !Array.isArray(data.contacts) || !Array.isArray(data.accounts)) return toast('Not a Rolodesk backup — contacts/accounts missing.', 'bad');
  const counts = stores.map(s => `${(data[s]||[]).length} ${s}`).join(', ');
  const ok = await confirmDialog(
    `Restore backup${data.exportedAt ? ' from ' + fmtDateTime(data.exportedAt) : ''}? This REPLACES everything currently in the app (${State.contacts.length} contacts) with the backup (${counts}). Export a backup of the current data first if you want to keep it.`,
    { danger: true, okLabel: 'Replace & restore', requireType: 'RESTORE' });
  if (!ok) return;
  for (const s of stores) {
    await new Promise((res, rej) => { const r = tx(s, 'readwrite').clear(); r.onsuccess = res; r.onerror = () => rej(r.error); });
    await idbBulk(s, (data[s] || []).filter(x => x && x.id));
  }
  if (data.settings && data.settings.id === 'app') await idbPut('settings', data.settings);
  State.session = null;
  await loadAll();
  applyTheme(State.settings.theme || 'dark');
  toast('Backup restored', 'good');
  navigate('#/home');
}
async function wipeAll(){
  if (!await confirmDialog('This permanently erases ALL lists, contacts, accounts, and history from this device. Export a backup first if you want to keep it.', { danger:true, okLabel:'Erase everything', requireType:'ERASE' })) return;
  for (const s of ALL_STORES) await new Promise(r => { const req = tx(s,'readwrite').clear(); req.onsuccess=r; req.onerror=r; });
  await loadAll(); toast('All data erased'); navigate('#/home');
}

/* ===== empty state ==================================================== */
function emptyState(ic, title, sub, btn, href){ const ik = ICONS[ic] ? icon(ic,'xl') : ic; return `<div class="empty"><div class="ic">${ik}</div><h3>${esc(title)}</h3>${sub?`<p>${esc(sub)}</p>`:''}${btn?`<div style="margin-top:18px"><button class="btn primary" data-nav="${href}">${esc(btn)}</button></div>`:''}</div>`; }
function bindEmpty(scope){ $$('[data-nav]', scope).forEach(b => b.onclick = () => navigate(b.dataset.nav)); }

/* ===== 12. Boot ======================================================= */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); $('#theme-toggle').innerHTML = icon(t==='dark'?'sun':'moon'); }
function bindGlobalNav() {
  document.body.addEventListener('click', e => { const el = e.target.closest('[data-nav]'); if (el) { e.preventDefault(); navigate(el.dataset.nav); } });
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openPalette(); }
  });
  $('#theme-toggle').onclick = () => { const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; saveSettings({ theme:t }); applyTheme(t); };
}
window.addEventListener('hashchange', render);
(async function boot() {
  try {
    await openDB();
    await loadAll();
    applyTheme(State.settings.theme || 'dark'); // the night-desk presentation is the primary experience
    bindGlobalNav();
    if (!location.hash) location.hash = '#/home';
    render();
  } catch (e) {
    $('#view').innerHTML = `<div class="empty"><div class="ic">!</div><h3>Could not start</h3><p>${esc(e.message||e)}</p></div>`;
    console.error(e);
  }
})();

/* expose a few for debugging / testing */
window.Rolodesk = { State, Import, seedSample, parseCSV, domainOf, companyKey, resolveZone, phoneKeyOf, callBand, summarizeTranscript, outcomeForm, saveRecording, idbGet };
})();
