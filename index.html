<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolodesk — Prospecting Rolodex &amp; Calling Desk</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📇</text></svg>">
</head>
<body>
<div id="app-root">
  <header id="topbar" hidden>
    <div class="topbar-inner">
      <button class="brand" data-nav="#/home" title="Home">
        <span class="brand-mark">📇</span><span class="brand-name">Rolodesk</span>
      </button>
      <nav class="topnav">
        <button data-nav="#/home">Home</button>
        <button data-nav="#/rolodex">Rolodex</button>
        <button data-nav="#/dashboard">Dashboard</button>
        <button data-nav="#/settings">Settings</button>
      </nav>
      <div class="topbar-right">
        <span id="resume-pill" class="resume-pill" hidden></span>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">🌙</button>
      </div>
    </div>
  </header>
  <main id="view"></main>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<style>
/* ==========================================================================
   Rolodesk — styles
   A clean, modern "digital Rolodex + calling desk" theme. Light & dark.
   ========================================================================== */

:root {
  --bg: #f4f5f8;
  --bg-elev: #ffffff;
  --bg-sunk: #eceef3;
  --card: #ffffff;
  --ink: #1a1f2e;
  --ink-soft: #4a5163;
  --ink-faint: #8a90a2;
  --line: #e2e5ec;
  --line-strong: #d0d4de;
  --accent: #4f46e5;
  --accent-soft: #eef0fe;
  --accent-ink: #ffffff;
  --green: #17a34a;
  --green-dark: #12813b;
  --green-soft: #e7f6ec;
  --amber: #c77700;
  --amber-soft: #fdf1de;
  --red: #d63b3b;
  --red-soft: #fbe9e9;
  --blue: #2563eb;
  --blue-soft: #e8f0fe;
  --purple: #7c3aed;
  --shadow: 0 1px 2px rgba(20,25,40,.06), 0 6px 20px rgba(20,25,40,.06);
  --shadow-lg: 0 10px 40px rgba(20,25,40,.18);
  --radius: 14px;
  --radius-sm: 9px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
}
:root[data-theme="dark"] {
  --bg: #0f1218;
  --bg-elev: #171b24;
  --bg-sunk: #10141c;
  --card: #1a1f2b;
  --ink: #eceef4;
  --ink-soft: #b3b9c9;
  --ink-faint: #7c8398;
  --line: #262c3a;
  --line-strong: #333a4c;
  --accent: #7c83ff;
  --accent-ink: #0f1218;
  --green: #2ecc71;
  --green-dark: #25a85d;
  --green-soft: #14301f;
  --amber: #e6a23c;
  --amber-soft: #33280f;
  --red: #ef5f5f;
  --red-soft: #331717;
  --blue: #5b8def;
  --blue-soft: #14203a;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  --shadow-lg: 0 16px 50px rgba(0,0,0,.55);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
h1,h2,h3,h4 { margin: 0; font-weight: 650; letter-spacing: -.01em; }
input, select, textarea {
  font-family: inherit; font-size: 14px; color: var(--ink);
  background: var(--bg-elev); border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm); padding: 9px 11px; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
label { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; }
::placeholder { color: var(--ink-faint); }

/* ---- Top bar ---- */
#topbar {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in srgb, var(--bg-elev) 88%, transparent);
  backdrop-filter: saturate(1.4) blur(10px);
  border-bottom: 1px solid var(--line);
}
.topbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 18px; padding: 10px 20px; }
.brand { display: flex; align-items: center; gap: 8px; background: none; border: 0; font-size: 16px; font-weight: 750; color: var(--ink); letter-spacing: -.02em; }
.brand-mark { font-size: 20px; }
.topnav { display: flex; gap: 4px; }
.topnav button { background: none; border: 0; color: var(--ink-soft); font-weight: 600; font-size: 14px; padding: 7px 12px; border-radius: 8px; }
.topnav button:hover { background: var(--bg-sunk); color: var(--ink); }
.topnav button.active { background: var(--accent); color: var(--accent-ink); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.icon-btn { background: var(--bg-sunk); border: 1px solid var(--line); border-radius: 8px; width: 34px; height: 34px; font-size: 15px; }
.icon-btn:hover { border-color: var(--line-strong); }
.resume-pill { background: var(--amber-soft); color: var(--amber); border: 1px solid color-mix(in srgb, var(--amber) 35%, transparent); padding: 5px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 650; cursor: pointer; }

/* ---- Layout ---- */
#view { max-width: 1200px; margin: 0 auto; padding: 26px 20px 80px; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.page-head h1 { font-size: 24px; }
.page-head .sub { color: var(--ink-faint); font-size: 13.5px; margin-top: 3px; }
.row { display: flex; gap: 12px; align-items: center; }
.wrap { flex-wrap: wrap; }
.grow { flex: 1; }
.muted { color: var(--ink-faint); }
.soft { color: var(--ink-soft); }
.center { text-align: center; }
.mono { font-family: var(--mono); font-size: 12.5px; }

/* ---- Buttons ---- */
.btn { display: inline-flex; align-items: center; gap: 7px; justify-content: center; border: 1px solid var(--line-strong); background: var(--bg-elev); color: var(--ink); font-weight: 600; font-size: 14px; padding: 9px 15px; border-radius: 10px; transition: .12s; }
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.btn.primary:hover { filter: brightness(1.06); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
.btn.ghost:hover { background: var(--bg-sunk); border-color: transparent; }
.btn.danger { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, transparent); background: var(--red-soft); }
.btn.sm { padding: 6px 11px; font-size: 13px; border-radius: 8px; }
.btn.lg { padding: 13px 22px; font-size: 15.5px; }
.btn.block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-call { background: var(--green); border: 1px solid var(--green-dark); color: #fff; font-weight: 750; font-size: 17px; padding: 15px 26px; border-radius: 12px; box-shadow: 0 6px 18px color-mix(in srgb, var(--green) 40%, transparent); }
.btn-call:hover { background: var(--green-dark); }
.btn-call .big { font-size: 19px; }

/* ---- Cards ---- */
.card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
.card.pad { padding: 18px; }

/* ---- Home ---- */
.home-hero { text-align: center; padding: 22px 0 30px; }
.home-hero h1 { font-size: 30px; letter-spacing: -.02em; }
.home-hero p { color: var(--ink-faint); margin-top: 8px; font-size: 15px; }
.home-doors { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 8px auto 30px; max-width: 900px; }
.door { position: relative; text-align: left; border: 1px solid var(--line); background: var(--card); border-radius: 18px; padding: 26px; cursor: pointer; transition: .16s; box-shadow: var(--shadow); overflow: hidden; }
.door:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow-lg); }
.door .door-ic { font-size: 30px; }
.door h2 { font-size: 20px; margin-top: 14px; }
.door p { color: var(--ink-soft); margin: 8px 0 0; font-size: 13.5px; }
.door .door-cta { margin-top: 16px; color: var(--accent); font-weight: 700; font-size: 14px; }
.door.upload { background: linear-gradient(160deg, color-mix(in srgb, var(--accent) 10%, var(--card)), var(--card)); }
.door.call   { background: linear-gradient(160deg, color-mix(in srgb, var(--green) 12%, var(--card)), var(--card)); }
.home-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; max-width: 900px; margin: 0 auto; }
.stat-mini { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; text-align: center; }
.stat-mini .n { font-size: 22px; font-weight: 750; letter-spacing: -.02em; }
.stat-mini .l { font-size: 11.5px; color: var(--ink-faint); margin-top: 2px; }

/* ---- Dropzone ---- */
.dropzone { border: 2px dashed var(--line-strong); border-radius: 16px; background: var(--bg-elev); padding: 46px 24px; text-align: center; transition: .15s; }
.dropzone.hot { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--bg-elev)); }
.dropzone .dz-ic { font-size: 40px; }
.dropzone h3 { margin-top: 12px; font-size: 18px; }
.dropzone p { color: var(--ink-faint); margin: 6px 0 16px; }

/* ---- Steps ---- */
.steps { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
.step { display: flex; align-items: center; gap: 8px; padding: 7px 13px; border-radius: 999px; background: var(--bg-sunk); color: var(--ink-faint); font-size: 13px; font-weight: 600; border: 1px solid transparent; }
.step .dot { width: 20px; height: 20px; border-radius: 50%; background: var(--line-strong); color: #fff; display: grid; place-items: center; font-size: 12px; }
.step.active { background: var(--accent); color: var(--accent-ink); }
.step.active .dot { background: rgba(255,255,255,.35); }
.step.done { color: var(--green); background: var(--green-soft); }
.step.done .dot { background: var(--green); }

/* ---- Preview stats grid ---- */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
.stat-box { border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; background: var(--card); }
.stat-box .n { font-size: 21px; font-weight: 750; }
.stat-box .l { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
.stat-box.warn .n { color: var(--amber); }
.stat-box.bad .n { color: var(--red); }
.stat-box.good .n { color: var(--green); }

/* ---- Tables ---- */
.tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.tbl th { text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-faint); padding: 10px 12px; border-bottom: 1px solid var(--line); background: var(--bg-elev); position: sticky; top: 0; }
table.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
table.tbl tr:last-child td { border-bottom: 0; }
table.tbl tbody tr:hover { background: var(--bg-sunk); }
.preview-table td { white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }

/* ---- Mapping ---- */
.map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.map-row { border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px; background: var(--card); }
.map-row .fld { font-weight: 650; font-size: 13.5px; display: flex; align-items: center; gap: 6px; }
.map-row select { width: 100%; margin-top: 7px; }
.map-row .sample { font-size: 11.5px; color: var(--ink-faint); margin-top: 6px; min-height: 14px; }
.req-star { color: var(--red); }

/* ---- Badges / chips ---- */
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 650; padding: 3px 9px; border-radius: 999px; background: var(--bg-sunk); color: var(--ink-soft); border: 1px solid var(--line); white-space: nowrap; }
.badge.green { background: var(--green-soft); color: var(--green-dark); border-color: color-mix(in srgb, var(--green) 30%, transparent); }
.badge.amber { background: var(--amber-soft); color: var(--amber); border-color: color-mix(in srgb, var(--amber) 30%, transparent); }
.badge.red { background: var(--red-soft); color: var(--red); border-color: color-mix(in srgb, var(--red) 30%, transparent); }
.badge.blue { background: var(--blue-soft); color: var(--blue); border-color: color-mix(in srgb, var(--blue) 30%, transparent); }
.badge.exact { background: var(--red-soft); color: var(--red); border-color: color-mix(in srgb, var(--red) 30%, transparent); }
.badge.possible { background: var(--amber-soft); color: var(--amber); border-color: color-mix(in srgb, var(--amber) 30%, transparent); }
.badge.dot::before { content:""; width:7px; height:7px; border-radius:50%; background: currentColor; }

.chips { display: flex; gap: 7px; flex-wrap: wrap; }
.chip { font-size: 12.5px; font-weight: 600; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line-strong); background: var(--bg-elev); color: var(--ink-soft); }
.chip:hover { border-color: var(--accent); }
.chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

/* ---- Filter bar ---- */
.filterbar { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 16px; box-shadow: var(--shadow); }
.filterbar .search-wrap { position: relative; flex: 1; min-width: 220px; }
.filterbar .search-wrap input { width: 100%; padding-left: 34px; }
.filterbar .search-ic { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); }
.filterbar select { min-width: 130px; }
.filter-controls { display: flex; gap: 9px; flex-wrap: wrap; align-items: center; margin-top: 10px; }

/* ---- Rolodex cards ---- */
.roldex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.rol-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); cursor: pointer; transition: .13s; position: relative; }
.rol-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.rol-card .rc-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
.rol-card .rc-name { font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
.rol-card .rc-sub { color: var(--ink-soft); font-size: 13px; margin-top: 1px; }
.rol-card .rc-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 12px; font-size: 12.5px; color: var(--ink-soft); }
.rol-card .rc-meta b { color: var(--ink); font-weight: 600; }
.rol-card .rc-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 13px; padding-top: 12px; border-top: 1px solid var(--line); }
.avatar { width: 40px; height: 40px; border-radius: 11px; background: var(--accent); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
.avatar.co { border-radius: 9px; background: var(--purple); }

/* ---- Calling workspace ---- */
.call-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
.call-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow-lg); overflow: hidden; }
.call-card .cc-head { padding: 20px 22px; border-bottom: 1px solid var(--line); display: flex; gap: 15px; align-items: flex-start; }
.call-card .cc-avatar { width: 54px; height: 54px; border-radius: 14px; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 20px; font-weight: 750; }
.call-card .cc-name { font-size: 22px; font-weight: 750; letter-spacing: -.02em; }
.call-card .cc-title { color: var(--ink-soft); font-size: 14.5px; margin-top: 2px; }
.call-card .cc-company { color: var(--accent); font-weight: 650; font-size: 14px; margin-top: 4px; }
.cc-body { padding: 18px 22px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 22px; }
.f { }
.f .fl { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-faint); font-weight: 650; }
.f .fv { font-size: 14.5px; margin-top: 2px; word-break: break-word; }
.f .fv a { font-weight: 600; }
.call-actions { display: flex; flex-wrap: wrap; gap: 9px; padding: 16px 22px; border-top: 1px solid var(--line); background: var(--bg-elev); }
.tz-clock { text-align: center; padding: 16px; border-radius: 14px; border: 1px solid var(--line); background: var(--card); box-shadow: var(--shadow); }
.tz-clock .now { font-size: 30px; font-weight: 750; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
.tz-clock .zone { font-size: 12.5px; color: var(--ink-faint); margin-top: 2px; }
.tz-band { margin-top: 12px; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 14px; }
.tz-band.good { background: var(--green-soft); color: var(--green-dark); }
.tz-band.ok   { background: var(--blue-soft); color: var(--blue); }
.tz-band.warn { background: var(--amber-soft); color: var(--amber); }
.tz-band.bad  { background: var(--red-soft); color: var(--red); }
.queue-side { margin-top: 16px; }
.queue-item { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 10px; border: 1px solid transparent; font-size: 13px; }
.queue-item:hover { background: var(--bg-sunk); }
.queue-item.current { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
.queue-item.done { opacity: .5; }
.queue-item .qn { flex: 1; }
.queue-num { width: 22px; height: 22px; border-radius: 6px; background: var(--bg-sunk); display: grid; place-items: center; font-size: 11px; font-weight: 700; color: var(--ink-faint); }

/* ---- Timeline ---- */
.timeline { position: relative; padding-left: 30px; }
.timeline::before { content:""; position: absolute; left: 10px; top: 4px; bottom: 4px; width: 2px; background: var(--line); }
.tl-item { position: relative; padding: 0 0 18px; }
.tl-item .tl-dot { position: absolute; left: -25px; top: 3px; width: 18px; height: 18px; border-radius: 50%; background: var(--bg); border: 2px solid var(--accent); display: grid; place-items: center; font-size: 9px; }
.tl-item .tl-head { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
.tl-item .tl-type { font-weight: 700; font-size: 13.5px; }
.tl-item .tl-time { font-size: 12px; color: var(--ink-faint); }
.tl-item .tl-body { font-size: 13.5px; color: var(--ink-soft); margin-top: 3px; }
.tl-item .tl-body .out { font-weight: 650; color: var(--ink); }
.pin-box { border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 7%, var(--card)); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; }

/* ---- Modal ---- */
.modal-scrim { position: fixed; inset: 0; background: rgba(12,15,22,.55); backdrop-filter: blur(3px); z-index: 100; display: grid; place-items: center; padding: 20px; }
.modal { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 88vh; overflow: auto; }
.modal.wide { max-width: 720px; }
.modal-head { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg-elev); z-index: 2; }
.modal-head h3 { font-size: 17px; }
.modal-body { padding: 20px; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0; background: var(--bg-elev); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field input, .field select, .field textarea { width: 100%; }
.field textarea { min-height: 74px; resize: vertical; }

/* ---- Toast ---- */
#toast-root { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--ink); color: var(--bg-elev); padding: 11px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-lg); animation: pop .2s; }
.toast.good { background: var(--green-dark); color: #fff; }
.toast.bad { background: var(--red); color: #fff; }
@keyframes pop { from { transform: translateY(8px); opacity: 0; } }

/* ---- Empty ---- */
.empty { text-align: center; padding: 60px 20px; color: var(--ink-faint); }
.empty .ic { font-size: 46px; }
.empty h3 { color: var(--ink); margin-top: 12px; font-size: 18px; }
.empty p { margin-top: 6px; }

/* ---- Misc ---- */
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-faint); font-weight: 700; margin: 22px 0 10px; }
.divider { height: 1px; background: var(--line); margin: 16px 0; }
.kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 14px; font-size: 13.5px; }

function levenshtein(a, b) {

function autoMap(headers) {
  const norm = h => h.toLowerCase().replace(/[^a-z0-9]/g, '');

    if (!dup && item.account.status !== 'existing' && st.accountKeyName) {
      const near = State.accounts.find(a => a.nameKey && a.nameKey !== st.accountKeyName && ratio(a.nameKey, st.accountKeyName) >= 0.85);
      if (near) item.account.note = `Possible company-name variation of "${near.name}"`;
    }

    if (dup) {
      item.dup = dup;
      item.action = dup.level === 'exact' ? 'merge' : 'keep_separate';
    }
    items.push(item);
    // record seen
    if (st.emailKey) seenEmail.set(st.emailKey, idx);
    if (st.linkedinKey) seenLinked.set(st.linkedinKey, idx);
    st.phoneKeys.forEach(pk => seenPhone.set(pk, idx));
    if (st.nameKey) seenNameCo.set(st.nameKey + '@' + st.accountKey, idx);
    if (st.accountKey) { if (!byAccountFile.has(st.accountKey)) byAccountFile.set(st.accountKey, []); byAccountFile.get(st.accountKey).push(idx); }
  });
  // stats
  const staged = items.map(i => i.staged);
  const stats = {
    rows: rows.length,
    companies: companies.size,
    contacts: staged.filter(s => nz(s.fullName)).length,
    phones: staged.filter(s => validPhone(s.directPhone) || validPhone(s.mobilePhone) || validPhone(s.companyPhone)).length,
    emails: staged.filter(s => validEmail(s.email)).length,
    linkedins: staged.filter(s => validLinkedin(s.linkedin)).length,
    exact: items.filter(i => i.dup.level === 'exact').length,
    possible: items.filter(i => i.dup.level === 'possible').length,
    missing: staged.filter(s => !nz(s.fullName) || !nz(s.companyName) || !hasPhone(s)).length,
    errors: staged.filter(s => !nz(s.fullName) && !nz(s.companyName)).length,
  };
  Import.items = items; Import.stats = stats;
  return { items, stats };
}

async function commitImport() {
  const now = nowISO();
  const meta = Import.listMeta;
  const list = {
    id: uid(), name: meta.name || 'Untitled list', description: meta.description || '', source: meta.source || '',
    fileName: Import.file ? Import.file.name : '', importedAt: now,
    columnMapping: { ...Import.mapping }, stats: null,
  };
  State.lists.push(list); await idbPut('lists', list);

  const acctByKey = new Map(); // key -> account (existing or new this import)
  const itemContactId = {}; // idx -> contactId created
  const newAccounts = [], newContacts = [], updatedContacts = [], updatedAccounts = [];
  const c = { created: 0, merged: 0, replaced: 0, skipped: 0, separate: 0, accounts: 0 };

  function resolveAccount(st) {
    const key = st.accountKey || ('name:' + st.accountKeyName) || ('row:' + uid());
    if (acctByKey.has(key)) return acctByKey.get(key);
    let acc = findAccountByKeys(st.domain, st.accountKeyName);
    if (acc) { if (!acc.sourceListIds.includes(list.id)) { acc.sourceListIds.push(list.id); acc.updatedAt = now; updatedAccounts.push(acc); } }
    else { acc = newAccountFrom(st, list.id); State.accounts.push(acc); newAccounts.push(acc); c.accounts++; }
    acctByKey.set(key, acc);
    return acc;
  }
  function mergeInto(existing, st, mode) {
    // Merge = keep most-recent info (spec): newer value wins when present, existing kept where the
    // new value is blank — so a populated field is never lost to a blank. Replace = take the new row
    // wholesale (may blank fields). Both preserve notes/call history/follow-ups/source lists, and
    // every field change is logged so nothing is overwritten silently.
    const F = [['firstName','First name'],['lastName','Last name'],['fullName','Name'],['department','Department'],['jobFunction','Function'],['seniority','Seniority'],['directPhone','Direct phone'],['mobilePhone','Mobile'],['companyPhone','Company phone'],['email','Email'],['linkedin','LinkedIn']];
    const replace = mode === 'replace';
    const changes = [];
    const put = (k, label, sv) => {
      const cur = existing[k];
      const write = replace ? (sv !== cur) : (nz(sv) && sv !== cur);
      if (!write) return;
      if (nz(cur)) changes.push(`${label} "${cur}"→"${nz(sv) ? sv : '(blank)'}"`);
      existing[k] = sv;
    };
    F.forEach(([k, label]) => put(k, label, st[k]));
    put('title', 'Title', st.jobTitle);
    existing.nameKey = nameKeyOf(existing.fullName);
    if (nz(st.notes)) existing.notes = nz(existing.notes) ? existing.notes + '\n' + st.notes : st.notes;
    if (!existing.sourceListIds.includes(list.id)) existing.sourceListIds.push(list.id);
    existing.updatedAt = now;
    updatedContacts.push(existing);
    logActivity('merge', { contactId: existing.id, accountId: existing.accountId,
      notes: `${replace ? 'Replaced' : 'Merged'} from import "${list.name}"${changes.length ? ' · ' + changes.join(', ') : ''}`,
      meta: { listId: list.id, mode } });
    return existing;
  }

  for (const item of Import.items) {
    const st = item.staged;
    const action = item.action;
    if (action === 'skip' || action === 'keep_existing') {
      c.skipped++;
      // still record list membership on the matched existing contact, and point later
      // file-duplicates at the same target so they don't leak through as new contacts.
      if (item.dup.kind === 'db' && item.dup.existingId) {
        itemContactId[item.idx] = item.dup.existingId;
        const ex = State.byId('contacts', item.dup.existingId);
        if (ex && !ex.sourceListIds.includes(list.id)) { ex.sourceListIds.push(list.id); ex.updatedAt = now; updatedContacts.push(ex); logActivity('import', { contactId: ex.id, accountId: ex.accountId, notes: `Appeared again in import "${list.name}" (kept existing)`, meta: { listId: list.id } }); }
      } else if (item.dup.kind === 'file' && item.dup.refIdx != null && itemContactId[item.dup.refIdx] != null) {
        itemContactId[item.idx] = itemContactId[item.dup.refIdx];
      }
      continue;
    }
    // target existing?
    let existing = null;
    if ((action === 'merge' || action === 'replace')) {
      if (item.dup.kind === 'db' && item.dup.existingId) existing = State.byId('contacts', item.dup.existingId);
      else if (item.dup.kind === 'file' && item.dup.refIdx != null) { const cid = itemContactId[item.dup.refIdx]; existing = cid ? State.byId('contacts', cid) : null; }
    }
    if (existing) {
      // ensure account link too
      resolveAccount(st);
      mergeInto(existing, st, action);
      itemContactId[item.idx] = existing.id;
      if (action === 'replace') c.replaced++; else c.merged++;
      continue;
    }
    // create new (import / import as separate)
    const acc = resolveAccount(st);
    const contact = contactFrom(st, acc.id, list.id);
    State.contacts.push(contact); newContacts.push(contact);
    itemContactId[item.idx] = contact.id;
    if (action === 'keep_separate' || (item.dup.level !== 'none')) c.separate++; else c.created++;
    logActivity('contact_created', { contactId: contact.id, accountId: acc.id, notes: `Imported from "${list.name}"`, meta: { listId: list.id }, contactZone: contact.timezone });
  }
  // persist
  await idbBulk('accounts', dedupeById([...newAccounts, ...updatedAccounts]));
  await idbBulk('contacts', dedupeById([...newContacts, ...updatedContacts]));
  list.stats = { ...Import.stats, imported: c.created + c.separate, merged: c.merged, replaced: c.replaced, skipped: c.skipped, accountsCreated: c.accounts };
  await idbPut('lists', list);
  await logActivity('import', { notes: `Imported list "${list.name}": ${c.created + c.separate} contacts, ${c.accounts} accounts, ${c.merged + c.replaced} merged, ${c.skipped} skipped`, meta: { listId: list.id, counts: c } });
  return { list, counts: c };
}
function dedupeById(arr){ const m = new Map(); arr.forEach(x => m.set(x.id, x)); return Array.from(m.values()); }

/* ===== 8. Router ======================================================= */
const Routes = {};
function route(path, fn){ Routes[path] = fn; }
function navigate(hash){ if (location.hash === hash) render(); else location.hash = hash; }
function currentRoute() {
  const h = location.hash.replace(/^#/, '') || '/home';
  const [path, ...rest] = h.split('/').filter(Boolean);
  return { name: '/' + (path || 'home'), param: rest.join('/') };
}
function render() {
  const { name, param } = currentRoute();
  State.route = name;
  const view = $('#view');
  const topbar = $('#topbar');
  topbar.hidden = (name === '/home' && !State.lists.length && !State.contacts.length) ? false : false;
  topbar.hidden = false;
  $$('#topnav button');
  $$('.topnav button').forEach(b => b.classList.toggle('active', b.dataset.nav === '#' + name || (name.startsWith('/rolodex') && b.dataset.nav === '#/rolodex')));
  const fn = Routes[name] || Routes['/home'];
  view.scrollTo?.(0, 0);
  fn(view, param);
  updateResumePill();
}
function updateResumePill() {
  const pill = $('#resume-pill');
  const s = State.sessions.filter(x => x.status === 'active').sort((a,b) => b.updatedAt.localeCompare(a.updatedAt))[0];
  if (s && s.cursor < s.queue.length) {
    pill.hidden = false;
    pill.textContent = `▶ Resume session (${s.cursor}/${s.queue.length})`;
    pill.onclick = () => { State.session = s; navigate('#/call'); };
  } else pill.hidden = true;
}

async function startImport(file) {
  resetImport();
  Import.file = file;
  toast('Reading ' + file.name + '…');
  try {
    const parsed = await parseFile(file);
    if (!parsed.rows.length) { toast('That file has no data rows.', 'bad'); resetImport(); return; }
    Import.parsed = parsed;
    Import.mapping = autoMap(parsed.headers);
    Import.step = 1;
    // default list name from filename
    Import.listMeta = { name: prettyListName(file.name), description: '', source: 'ZoomInfo export' };
    navigate('#/upload');
  } catch (e) { toast(e.message || 'Could not read file', 'bad'); resetImport(); render(); }
}
function prettyListName(fn){ return fn.replace(/\.[^.]+$/, '').replace(/[_-]+/g, ' ').replace(/\b\w/g, m => m.toUpperCase()).trim(); }
function resetImport(){ Object.assign(Import, { step: 0, file: null, parsed: null, mapping: {}, items: null, stats: null, listMeta: {} }); }

const ACTION_LABEL = { merge:'Merge', replace:'Replace', keep_separate:'Import separate', import:'Import', keep_existing:'Keep existing', skip:'Skip' };
function dupGroup(title, list, cls, actions) {
  if (!list.length) return `<div class="section-title">${title} <span class="pill-count" style="background:var(--line-strong);color:var(--ink-soft)">0</span></div><p class="hint">None found.</p>`;

      <button class="btn sm ghost" data-bulk="${cls}" style="margin-left:8px">Set all…</button></div>

    <tbody>
      ${list.map(it => {
        const match = it.dup.kind === 'db' ? existingLabel(it.dup.existingId) : (it.dup.refIdx!=null?`Row ${it.dup.refIdx+2} in this file`:'—');
        return `<tr data-idx="${it.idx}">
          <td><b>${esc(contactName(it.staged))}</b><div class="hint">${esc(it.staged.companyName)} · ${esc(it.staged.jobTitle)}</div></td>
          <td>${esc(match)}</td>
          <td><span class="badge ${cls}">${esc(it.dup.reason)}</span></td>
          <td><select data-action="${it.idx}">${actions.map(a=>`<option value="${a}" ${it.action===a?'selected':''}>${ACTION_LABEL[a]}</option>`).join('')}</select></td>
        </tr>`; }).join('')}
    </tbody></table></div>`;
}
function existingLabel(id){ const c = State.byId('contacts', id); if (!c) return 'existing contact'; const a = accountOf(c); return `${contactName(c)} · ${a?accountName(a):''}`; }
function bindDupActions(w) {
  $$('select[data-action]', w).forEach(sel => sel.onchange = () => { const it = Import.items.find(i => i.idx == sel.dataset.action); it.action = sel.value; });
  $$('[data-bulk]', w).forEach(btn => btn.onclick = () => {
    const cls = btn.dataset.bulk;
    const actions = cls === 'exact' ? ['merge','replace','keep_separate','keep_existing','skip'] : ['keep_separate','merge','keep_existing','skip'];
    const m = modal({ title: 'Set all ' + cls + ' duplicates to…', body:
      `<div class="chips">${actions.map(a=>`<button class="chip" data-a="${a}">${ACTION_LABEL[a]}</button>`).join('')}</div>` });
    $$('[data-a]', m.root).forEach(b => b.onclick = () => {
      Import.items.filter(i => i.dup.level === cls).forEach(i => i.action = b.dataset.a);
      m.close(); render();
    });
  });
}

function renderStepSave(w) {
  const m = Import.listMeta;

  const counts = summarizeActions();
  w.innerHTML = `
    <div class="form-grid" style="max-width:640px">
      <div class="field full"><label>List name</label><input id="ln" value="${esc(m.name||'')}" placeholder="e.g. ${esc(examples[0])}"></div>
      <div class="field full"><label>Description / source (optional)</label><input id="ld" value="${esc(m.description||'')}" placeholder="Where these leads came from"></div>
    </div>
    <div class="chips" style="margin-top:10px">${examples.map(e=>`<button class="chip" data-ex="${esc(e)}">${esc(e)}</button>`).join('')}</div>
    <div class="card pad" style="margin-top:20px;max-width:640px">
      <div class="section-title" style="margin-top:0">On save</div>
      <div class="kv">
        <div class="k">New contacts</div><div>${counts.create}</div>
        <div class="k">Merged / updated</div><div>${counts.merge}</div>
        <div class="k">Skipped / kept existing</div><div>${counts.skip}</div>
        <div class="k">Accounts affected</div><div>~${counts.accounts}</div>
      </div>
    </div>
    <div class="row" style="justify-content:space-between;margin-top:20px;max-width:640px">
      <button class="btn ghost" data-back>← Back</button>
      <div class="row" style="gap:10px">
        <button class="btn" data-save>Save to Rolodex</button>
        <button class="btn primary" data-save-call>Save &amp; start calling →</button>
      </div>
    </div>`;
  $('#ln', w).oninput = e => m.name = e.target.value;
  $('#ld', w).oninput = e => m.description = e.target.value;
  $$('[data-ex]', w).forEach(b => b.onclick = () => { m.name = b.dataset.ex; $('#ln', w).value = b.dataset.ex; });
  $('[data-back]', w).onclick = () => { Import.step = 3; render(); };
  $('[data-save]', w).onclick = () => doSave(false);
  $('[data-save-call]', w).onclick = () => doSave(true);
}
function summarizeActions(){ const c={create:0,merge:0,skip:0}; const accs=new Set(); Import.items.forEach(i=>{ if(i.staged.accountKey) accs.add(i.staged.accountKey); if(i.action==='merge'||i.action==='replace')c.merge++; else if(i.action==='skip'||i.action==='keep_existing')c.skip++; else c.create++; }); c.accounts=accs.size; return c; }
async function doSave(thenCall) {
  if (!nz(Import.listMeta.name)) return toast('Please name the list.', 'bad');
  toast('Saving…');
  const { list, counts } = await commitImport();
  const listId = list.id;
  resetImport();
  toast(`Imported "${list.name}" — ${counts.created + counts.separate} new, ${counts.merged + counts.replaced} merged`, 'good');
  if (thenCall) { startSession({ listId, name: 'Calling: ' + list.name }); navigate('#/call'); }
  else navigate('#/rolodex/' + listId);
}

const RolState = { view: 'accounts', filters: {}, listId: '' };
route('/rolodex', (view, param) => {

  const accounts = uniqueAccounts(contacts);
  view.innerHTML = `
    <div class="page-head">

  $$('[data-view]', view).forEach(b => b.onclick = () => { RolState.view = b.dataset.view; render(); });
  bindFilterBar(view);
  $('[data-startsession]', view).onclick = () => {
    const withPhone = contacts.filter(hasPhone);
    if (!withPhone.length) return toast('No contacts with a phone number in this view.', 'bad');

});

/* live clocks */
let _clockTimer = null;
function startClocks(scope) {
  if (_clockTimer) clearInterval(_clockTimer);
  const tick = () => $$('[data-clock]', scope || document).forEach(el => { if (el.isConnected) el.textContent = zoneTimeStr(el.dataset.clock); });
  _clockTimer = setInterval(tick, 15000);
}

  const m = modal({ wide:true, title:'Call outcome — ' + contactName(c), body:`

      <div class="field"><label>Account status</label><select id="o-astatus"><option value="">(unchanged)</option>${ACCOUNT_STATUSES.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="field full"><label><input type="checkbox" id="o-fup"> Schedule a follow-up</label></div>
      <div class="field" id="fup-wrap" style="display:none"><label>Follow-up date &amp; time</label><input type="datetime-local" id="o-fupdt"></div>
      <div class="field" id="fup-wrap2" style="display:none"><label>Reminder</label><select id="o-reminder"><option>At time of event</option><option>15 minutes before</option><option>1 hour before</option><option>1 day before</option></select></div>
    </div>`, footer:`<button class="btn ghost" data-cancel>Cancel</button><button class="btn primary" data-save>Save outcome &amp; next →</button>` });
  const sel = $('#o-outcome', m.root);
  sel.onchange = () => { const st = OUTCOME_STATUS[sel.value]; if (st) $('#o-cstatus', m.root).value = st;
    const wantFup = /follow-up required|Send information|Call back later|Meeting requested/i.test(sel.value); if (wantFup) { $('#o-fup', m.root).checked = true; toggleFup(); } };
  const toggleFup = () => { const on = $('#o-fup', m.root).checked; $('#fup-wrap', m.root).style.display = on?'flex':'none'; $('#fup-wrap2', m.root).style.display = on?'flex':'none'; if (on && !$('#o-fupdt', m.root).value) $('#o-fupdt', m.root).value = defaultFollowupLocal(); };
  $('#o-fup', m.root).onchange = toggleFup;
  $('[data-cancel]', m.root).onclick = m.close;
  $('[data-save]', m.root).onclick = async () => {
    const endISO = nowISO();
    const outcome = sel.value;
    const g = id => nz($('#'+id, m.root).value);
    const notes = g('o-notes');
    const durationSec = Math.max(0, Math.round((new Date(endISO)-new Date(startISO))/1000));
    // update contact
    const patch = { lastContactedAt: endISO, lastOutcome: outcome, callCount: (c.callCount||0)+1, status: g('o-cstatus')||c.status,
      interest: g('o-interest')||c.interest };
    if (outcome === 'Do not contact') patch.doNotContact = true;
    await updateContact(c, patch, { silent:true });
    // account
    const a = accountOf(c);
    if (a) { const ap = { lastContactedAt: endISO, lastOutcome: outcome }; if (g('o-astatus')) ap.status = g('o-astatus'); await updateAccount(a, ap); }
    // log the completed call (replace the attempt marker with full detail)
    await logActivity('call', { contactId:c.id, accountId:c.accountId, outcome, notes, contactZone:z.zone,
      meta:{ startedAt:startISO, endedAt:endISO, durationSec, reachedRight:g('o-right'), interest:g('o-interest'), objection:g('o-objection'),
        nextAction:g('o-next'), referralName:g('o-refname'), referralInfo:g('o-refinfo'), phase:'completed' } });

    if (outcome === 'Meeting booked') await logActivity('meeting', { contactId:c.id, accountId:c.accountId, notes:'Meeting booked' });

    if ($('#o-fup', m.root).checked && $('#o-fupdt', m.root).value) {
      await createFollowup(c, { dueAt: new Date($('#o-fupdt', m.root).value).toISOString(), reminder: g('o-reminder'), reason:'From call: '+outcome, plannedAction:g('o-next') });
    }
    m.close();
    toast('Outcome saved · call logged '+fmtRelative(endISO), 'good');
    if (State.session) { advanceSession(); }
    render();
    // Bad number / wrong person → open the editor right away so the master list gets fixed
    // while it's fresh. The session has already advanced behind this dialog.
    if (outcome === 'Phone number invalid' || outcome === 'Wrong contact') {
      editContactDialog(c, {
        reason: outcome === 'Phone number invalid'
          ? 'That number didn\'t work — correct it or clear the field so it doesn\'t get dialed again.'
          : 'Wrong contact — update the details (or fix the name/title) before moving on.',
        note: 'From call outcome: ' + outcome + (notes ? ' — ' + notes : ''),
      });
    }
  };
}

function inRange(iso){ if (DashState.range==='all') return true; if (DashState.range==='today') return isToday(iso); if (DashState.range==='week') return isThisWeek(iso); if (DashState.range==='month') return isThisMonth(iso); return true; }
function mergeCount(){ return State.activities.filter(a=>a.type==='merge').length; }
function avgPerDay(calls){ if (!calls.length) return 0; const days = new Set(calls.map(c=>c.at.slice(0,10))); return Math.round(calls.length/days.size*10)/10; }
function pct(a,b){ return b? Math.round(a/b*100)+'%':'0%'; }

function bindFilterBar(scope) {
  const f = RolState.filters;
  const rerender = debounce(render, 220);
  const s = $('#f-search', scope); if (s) s.oninput = e => { f.q = e.target.value; rerender(); };
  const bind = (id, key) => { const el = $('#'+id, scope); if (el) el.onchange = e => { f[key] = e.target.value; render(); }; };
  bind('f-status','status'); bind('f-priority','priority'); bind('f-seniority','seniority'); bind('f-industry','industry'); bind('f-state','state');
  const fl = $('#f-list', scope); if (fl) fl.onchange = e => { RolState.listId = e.target.value; render(); };
  $$('[data-quick]', scope).forEach(b => b.onclick = () => { f.quick = f.quick === b.dataset.quick ? '' : b.dataset.quick; render(); });
  const rb = $('#f-reset', scope); if (rb) rb.onclick = () => { RolState.filters = {}; RolState.listId=''; render(); };
}
function applyFilters(contacts, f) {
  let out = contacts.slice();
  if (RolState.listId) out = out.filter(c => (c.sourceListIds||[]).includes(RolState.listId));
  if (f.status) out = out.filter(c => c.status === f.status);
  if (f.priority) out = out.filter(c => (c.priority||'Medium') === f.priority);
  if (f.seniority) out = out.filter(c => c.seniority === f.seniority);
  if (f.industry) out = out.filter(c => { const a = accountOf(c); return a && a.industry === f.industry; });
  if (f.state) out = out.filter(c => (c.state || (accountOf(c)||{}).state) === f.state);
  if (f.quick) out = out.filter(c => quickMatch(c, f.quick));
  if (nz(f.q)) { const q = f.q.toLowerCase(); out = out.filter(c => searchBlob(c).includes(q)); }
  return out;
}
function quickMatch(c, q) {
  switch (q) {
    case 'never': return !c.lastContactedAt;
    case 'today': return isToday(c.lastContactedAt);
    case 'week': return isThisWeek(c.lastContactedAt);
    case 'due_today': return isToday(c.nextFollowUpAt);
    case 'overdue': return c.nextFollowUpAt && new Date(c.nextFollowUpAt) < new Date() && c.status!=='Completed';
    case 'no_fup': return !c.nextFollowUpAt;
    case 'inwindow': { const z = resolveZone(c); const p = zoneParts(z.zone); return callBand(p.hour,p.minute,State.settings.preferredCallWindow).key==='good'; }
    case 'hot': return c.interest === 'Hot';
    default: return true;
  }
}
function searchBlob(c) {
  const a = accountOf(c);
  const acts = activitiesForContact(c.id).map(x => `${x.outcome||''} ${x.notes||''}`).join(' ');
  const lists = (c.sourceListIds||[]).map(listName).join(' ');
  return [contactName(c), c.title, c.department, c.email, c.linkedin, primaryPhone(c), c.directPhone, c.mobilePhone,
    a?a.name:'', a?a.industry:'', c.lastOutcome, acts, lists].map(x=>nz(x)).join(' ').toLowerCase();
}

/* ===== 11. Calendar (ics + google) ==================================== */
function icsFor(f, c) {
  const a = accountOf(c);
  const dt = s => new Date(s).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const end = new Date(new Date(f.dueAt).getTime()+30*60000).toISOString();
  const desc = calDescription(f, c, a).replace(/\n/g,'\\n');
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Rolodesk//EN','BEGIN:VEVENT',
    'UID:'+f.id+'@rolodesk','DTSTAMP:'+dt(nowISO()),'DTSTART:'+dt(f.dueAt),'DTEND:'+dt(end),
    'SUMMARY:'+icsEsc(`Follow up with ${contactName(c)} at ${a?accountName(a):''}`),
    'DESCRIPTION:'+icsEsc(desc),'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
const icsEsc = s => String(s).replace(/([,;])/g,'\\$1');
function calDescription(f, c, a) {
  return [`Contact: ${contactName(c)} — ${or(c.title,'')}`,
    `Company: ${a?accountName(a):''}`, `Phone: ${primaryPhone(c)||'—'}`, `Email: ${c.email||'—'}`,
    `LinkedIn: ${c.linkedin||'—'}`, `Previous outcome: ${c.lastOutcome||'—'}`,
    `Latest notes: ${(c.notes||'').slice(0,200)||'—'}`, `Reason: ${f.reason||'Follow-up'}`,
    `Planned next action: ${f.plannedAction||'—'}`].join('\n');
}
function googleCalUrl(f, c) {
  const a = accountOf(c);
  const dt = s => new Date(s).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const end = new Date(new Date(f.dueAt).getTime()+30*60000).toISOString();
  const p = new URLSearchParams({ action:'TEMPLATE',
    text:`Follow up with ${contactName(c)} at ${a?accountName(a):''}`,
    dates:`${dt(f.dueAt)}/${dt(end)}`, details: calDescription(f, c, a) });
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}
function openCalendar(f) {
  const c = State.byId('contacts', f.contactId); if (!c) return;
  const blob = new Blob([icsFor(f, c)], { type:'text/calendar' });
  const url = URL.createObjectURL(blob);
  const m = modal({ title:'Add follow-up to calendar', body:`
    <p style="margin-top:0">Follow-up with <b>${esc(contactName(c))}</b> on <b>${esc(fmtDateTime(f.dueAt))}</b>.</p>
    <div class="row wrap" style="gap:10px;margin-top:12px">
      <a class="btn primary" href="${url}" download="followup-${esc(contactName(c)).replace(/\s+/g,'-')}.ics">⬇ Download .ics</a>
      <a class="btn" href="${esc(googleCalUrl(f,c))}" target="_blank" rel="noopener">📅 Add to Google Calendar</a>
    </div>
    <p class="hint" style="margin-top:14px">The .ics opens in Apple Calendar / Outlook. Description is pre-filled with role, phone, email, LinkedIn, previous outcome, notes, and the planned next action.</p>` });
}

/* ===== domain mutations ================================================ */
async function updateContact(c, patch, { silent } = {}) {
  const changedStatus = patch.status && patch.status !== c.status;
  Object.assign(c, patch, { updatedAt: nowISO() });
  await idbPut('contacts', c);
  if (changedStatus && !silent) logActivity('status_change', { contactId:c.id, accountId:c.accountId, notes:`Status → ${patch.status}` });
  if (!silent) toast('Saved','good');
}
async function updateAccount(a, patch) { Object.assign(a, patch, { updatedAt: nowISO() }); await idbPut('accounts', a); }
async function toggleDNC(c) {
  if (!c.doNotContact) { if (!await confirmDialog(`Mark ${contactName(c)} as Do Not Contact? They'll be flagged and excluded from calling queues.`, { danger:true, okLabel:'Mark do not contact' })) return; }
  await updateContact(c, { doNotContact: !c.doNotContact, status: !c.doNotContact ? 'Do not contact' : 'Active' }, { silent:true });
  logActivity('status_change', { contactId:c.id, accountId:c.accountId, notes: c.doNotContact ? 'Marked Do Not Contact' : 'Removed Do Not Contact' });
  toast('Updated','good'); render();
}
function addNoteDialog(c) {
  const m = modal({ title:'Add note — '+contactName(c), body:`<div class="field"><label>Note</label><textarea id="n-text" autofocus placeholder="Type your note…"></textarea></div>`,
    footer:`<button class="btn ghost" data-cancel>Cancel</button><button class="btn primary" data-save>Save note</button>` });
  $('[data-cancel]', m.root).onclick = m.close;
  $('[data-save]', m.root).onclick = async () => { const t = nz($('#n-text', m.root).value); if (!t) return m.close(); await logActivity('note', { contactId:c.id, accountId:c.accountId, notes:t, contactZone:resolveZone(c).zone }); m.close(); toast('Note added','good'); render(); };
}
function editContactDialog(c, opts = {}) {
  const m = modal({ wide:true, title:'Edit — '+contactName(c), body:`
    ${opts.reason?`<div class="pin-box" style="margin-top:0;margin-bottom:14px">📞 ${esc(opts.reason)}</div>`:''}
    <div class="form-grid">
    <div class="field"><label>Full name</label><input id="e-name" value="${esc(c.fullName)}"></div>
    <div class="field"><label>Job title</label><input id="e-title" value="${esc(c.title)}"></div>
    <div class="field"><label>Direct phone</label><input id="e-dp" value="${esc(c.directPhone)}" placeholder="Clear it if the number is dead"></div>
    <div class="field"><label>Mobile phone</label><input id="e-mp" value="${esc(c.mobilePhone)}"></div>
    <div class="field"><label>Company phone</label><input id="e-cp" value="${esc(c.companyPhone)}"></div>
    <div class="field"><label>Email</label><input id="e-email" value="${esc(c.email)}"></div>
    <div class="field"><label>LinkedIn</label><input id="e-li" value="${esc(c.linkedin)}"></div>
    <div class="field"><label>Priority</label><select id="e-pri">${PRIORITIES.map(p=>`<option ${c.priority===p?'selected':''}>${p}</option>`).join('')}</select></div>
    <div class="field"><label>Status</label><select id="e-status">${CONTACT_STATUSES.map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="field full"><label>Note about this update (optional — saved to the contact's history and master list)</label><textarea id="e-note" placeholder="e.g. Direct line disconnected — got mobile from reception">${esc(opts.note||'')}</textarea></div>
    </div>`, footer:`<button class="btn ghost" data-cancel>Cancel</button><button class="btn primary" data-save>Save changes</button>` });
  $('[data-cancel]', m.root).onclick = m.close;
  $('[data-save]', m.root).onclick = async () => {
    const g = id => nz($('#'+id, m.root).value);
    const patch = { fullName:g('e-name'), title:g('e-title'), directPhone:g('e-dp'), mobilePhone:g('e-mp'), companyPhone:g('e-cp'), email:g('e-email'), linkedin:g('e-li'), priority:$('#e-pri',m.root).value, status:$('#e-status',m.root).value };
    patch.nameKey = nameKeyOf(patch.fullName);
    // Field-level audit: record exactly what changed so an edit is never silent on the master list.
    const LBL = { fullName:'Name', title:'Title', directPhone:'Direct phone', mobilePhone:'Mobile', companyPhone:'Company phone', email:'Email', linkedin:'LinkedIn', priority:'Priority', status:'Status' };
    const changes = Object.keys(LBL).filter(k => nz(c[k]) !== nz(patch[k])).map(k => `${LBL[k]} "${nz(c[k])||'(blank)'}" → "${nz(patch[k])||'(blank)'}"`);
    const note = nz($('#e-note', m.root).value);
    if (!changes.length && !note) { m.close(); return; } // nothing actually changed
    if (note) patch.notes = nz(c.notes) ? c.notes + '\n' + note : note; // reflect on the master record
    await updateContact(c, patch, { silent:true });
    const summary = changes.length ? changes.join(', ') : 'Note added (no field changes)';
    await logActivity('contact_updated', { contactId:c.id, accountId:c.accountId,
      notes: note ? `${summary} · Note: ${note}` : summary, meta:{ changes, note: note || null } });
    m.close(); toast('Contact updated','good'); render();
  };
}
function followupDialog(c) {
  const m = modal({ title:'Schedule follow-up — '+contactName(c), body:`<div class="form-grid">
    <div class="field full"><label>Date &amp; time (your local time)</label><input type="datetime-local" id="fu-dt" value="${defaultFollowupLocal()}"></div>
    <div class="field"><label>Reminder</label><select id="fu-rem"><option>At time of event</option><option>15 minutes before</option><option>1 hour before</option><option>1 day before</option></select></div>
    <div class="field"><label>Reason</label><input id="fu-reason" placeholder="e.g. Callback requested"></div>
    <div class="field full"><label>Planned next action</label><input id="fu-next" placeholder="e.g. Present pricing"></div>
    <div class="field full"><label style="display:flex;gap:8px;align-items:center"><input type="checkbox" id="fu-cal" checked> Offer calendar event after saving</label></div>
    </div>`, footer:`<button class="btn ghost" data-cancel>Cancel</button><button class="btn primary" data-save>Schedule</button>` });
  $('[data-cancel]', m.root).onclick = m.close;
  $('[data-save]', m.root).onclick = async () => {
    const v = $('#fu-dt', m.root).value; if (!v) return toast('Pick a date/time','bad');
    const f = await createFollowup(c, { dueAt:new Date(v).toISOString(), reminder:$('#fu-rem',m.root).value, reason:nz($('#fu-reason',m.root).value), plannedAction:nz($('#fu-next',m.root).value) });
    m.close(); toast('Follow-up scheduled','good');
    if ($('#fu-cal', m.root).checked) openCalendar(f);
    render();
  };
}
async function createFollowup(c, { dueAt, reminder, reason, plannedAction }) {
  const f = { id:uid(), contactId:c.id, accountId:c.accountId, dueAt, timezone:State.settings.userTimezone, reminder:reminder||'At time of event', reason:reason||'Follow-up', plannedAction:plannedAction||'', status:'scheduled', calendarLinked:false, createdAt:nowISO(), updatedAt:nowISO() };
  State.followups.push(f); await idbPut('followups', f);
  // nextFollowUpAt tracks the EARLIEST scheduled follow-up; don't let a later one hide a sooner callback.
  if (!c.nextFollowUpAt || dueAt < c.nextFollowUpAt) await updateContact(c, { nextFollowUpAt: dueAt }, { silent:true });
  const a = accountOf(c); if (a && (!a.nextFollowUpAt || dueAt < a.nextFollowUpAt)) await updateAccount(a, { nextFollowUpAt: dueAt });
  await logActivity('followup_created', { contactId:c.id, accountId:c.accountId, notes:`Follow-up ${fmtDateTime(dueAt)}${plannedAction?' · '+plannedAction:''}`, meta:{ followupId:f.id, nextAction:plannedAction } });
  return f;
}
async function completeFollowup(id) {
  const f = State.byId('followups', id); if (!f) return;
  f.status = 'done'; f.updatedAt = nowISO(); await idbPut('followups', f);
  const c = State.byId('contacts', f.contactId);
  if (c) { const next = State.followups.filter(x=>x.contactId===c.id&&x.status==='scheduled').sort((a,b)=>a.dueAt.localeCompare(b.dueAt))[0]; await updateContact(c, { nextFollowUpAt: next?next.dueAt:null }, { silent:true }); }
  logActivity('followup_changed', { contactId:f.contactId, accountId:f.accountId, notes:'Follow-up marked done' });
  toast('Follow-up completed','good'); render();
}
function bindFupRows(scope){ $$('[data-cal]', scope).forEach(b => b.onclick = () => openCalendar(State.byId('followups', b.dataset.cal))); $$('[data-done]', scope).forEach(b => b.onclick = () => completeFollowup(b.dataset.done)); }

/* ===== sessions / queue =============================================== */
function buildQueue(contacts) {
  const win = State.settings.preferredCallWindow;
  const scored = contacts.filter(c => !c.doNotContact).map(c => {
    const z = resolveZone(c); const p = zoneParts(z.zone); const band = callBand(p.hour,p.minute,win);
    let s = 0;
    if (c.nextFollowUpAt && new Date(c.nextFollowUpAt) < new Date()) s += 1000; // overdue
    if (isToday(c.nextFollowUpAt)) s += 800;
    if (c.priority==='High') s += 300; else if (c.priority==='Medium') s += 100;
    if (band.key==='good') s += 200;
    if (!c.lastContactedAt) s += 60; // never called
    if (/Connected|answered/i.test(c.lastOutcome||'')) s += 40;
    return { c, s };
  });
  scored.sort((a,b) => b.s - a.s);
  return scored.map(x => x.c);
}
function startSession({ listId, name, queueIds, filterSnapshot }) {
  let ids = queueIds;
  if (!ids) { let cs = State.contacts; if (listId) cs = cs.filter(c => (c.sourceListIds||[]).includes(listId)); ids = buildQueue(cs.filter(hasPhone)).map(c=>c.id); }
  const s = { id:uid(), name:name||'Calling session', listId:listId||null, filterSnapshot:filterSnapshot||null, queue:ids, cursor:0, status:'active', createdAt:nowISO(), updatedAt:nowISO() };
  State.sessions.filter(x=>x.status==='active').forEach(x=>{ x.status='paused'; idbPut('sessions', x); });
  State.sessions.push(s); State.session = s; idbPut('sessions', s);
  logActivity('note', { notes:`Started calling session "${s.name}" (${ids.length} contacts)` });
}
function advanceSession(){ const s = State.session; if (!s) return; s.cursor = Math.min(s.cursor+1, s.queue.length); s.updatedAt = nowISO(); saveSession(); }
async function saveSession(){ if (State.session) await idbPut('sessions', State.session); }

/* ===== timeline / activity queries ==================================== */
function activitiesForContact(id){ return State.activities.filter(a => a.contactId === id).sort((a,b)=>a.at.localeCompare(b.at)); }
function activitiesForAccount(id){ return State.activities.filter(a => a.accountId === id).sort((a,b)=>a.at.localeCompare(b.at)); }
const TYPE_ICON = { import:'📥', contact_created:'✨', contact_updated:'✏️', call:'📞', note:'📝', email:'✉️', linkedin:'in', referral:'↗️', meeting:'🤝', followup_created:'📅', followup_changed:'🔁', status_change:'🔀', merge:'🔗', session_complete:'🎉' };
const TYPE_LABEL = { import:'List import', contact_created:'Contact created', contact_updated:'Contact updated', call:'Call', note:'Note', email:'Email', linkedin:'LinkedIn', referral:'Referral', meeting:'Meeting', followup_created:'Follow-up scheduled', followup_changed:'Follow-up updated', status_change:'Status change', merge:'Records merged', session_complete:'Session complete' };
function renderTimeline(acts) {
  if (!acts.length) return '<p class="hint">No activity yet.</p>';
  const items = acts.slice().reverse();
  return `<div class="timeline">${items.map(a => {
    const dur = a.meta && a.meta.durationSec ? ` · ${Math.round(a.meta.durationSec/60)||'<1'} min` : '';
    const local = a.contactLocalTime ? ` · contact local ${esc(a.contactLocalTime)}` : '';
    return `<div class="tl-item"><div class="tl-dot">${TYPE_ICON[a.type]||'•'}</div>
      <div class="tl-head"><span class="tl-type">${esc(TYPE_LABEL[a.type]||a.type)}</span>
        ${a.outcome?`<span class="badge blue">${esc(a.outcome)}</span>`:''}
        <span class="tl-time">${esc(fmtDateTime(a.at))} (${esc(fmtRelative(a.at))})${dur}</span></div>
      ${a.notes?`<div class="tl-body">${esc(a.notes)}</div>`:''}
      ${a.meta&&a.meta.nextAction?`<div class="tl-body"><span class="out">Next:</span> ${esc(a.meta.nextAction)}</div>`:''}
      <div class="hint">${esc(a.actor||'Me')}${a.tzContact?local:''} · ${esc(a.tzUser||'')}</div>
    </div>`; }).join('')}</div>`;
}

/* follow-up helpers */
function followupsDueToday(){ return State.followups.filter(f => f.status==='scheduled' && isToday(f.dueAt)); }
function followupsOverdue(){ return State.followups.filter(f => f.status==='scheduled' && new Date(f.dueAt) < new Date() && !isToday(f.dueAt)); }

/* ===== export / wipe ================================================== */
function download(name, text, type='application/json'){ const b = new Blob([text], { type }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u), 1000); }
function exportJSON(){ const data = { lists:State.lists, accounts:State.accounts, contacts:State.contacts, activities:State.activities, followups:State.followups, sessions:State.sessions, settings:State.settings, exportedAt:nowISO() }; download('rolodesk-backup-'+nowISO().slice(0,10)+'.json', JSON.stringify(data,null,2)); toast('Backup downloaded','good'); }
function exportCSV(){
  const cols = ['fullName','title','company','directPhone','mobilePhone','companyPhone','email','linkedin','status','priority','interest','lastContactedAt','lastOutcome','nextFollowUpAt','callCount','notes','lastUpdated','sourceLists'];
  const rows = State.contacts.map(c => { const a = accountOf(c); return { fullName:contactName(c), title:c.title, company:a?a.name:'', directPhone:c.directPhone, mobilePhone:c.mobilePhone, companyPhone:c.companyPhone, email:c.email, linkedin:c.linkedin, status:c.status, priority:c.priority, interest:c.interest, lastContactedAt:c.lastContactedAt||'', lastOutcome:c.lastOutcome||'', nextFollowUpAt:c.nextFollowUpAt||'', callCount:c.callCount||0, notes:c.notes||'', lastUpdated:c.updatedAt||'', sourceLists:(c.sourceListIds||[]).map(listName).join('; ') }; });
  const csv = [cols.join(','), ...rows.map(r => cols.map(k => `"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
  download('rolodesk-contacts-'+nowISO().slice(0,10)+'.csv', csv, 'text/csv'); toast('Contacts exported','good');
}
async function restoreBackup(file) {
  let data;
  try { data = JSON.parse(await file.text()); }
  catch { return toast('That file is not valid JSON.', 'bad'); }
  const stores = ['lists','accounts','contacts','activities','followups','sessions'];
  if (!data || !Array.isArray(data.contacts) || !Array.isArray(data.accounts)) return toast('Not a Rolodesk backup — contacts/accounts missing.', 'bad');
  const counts = stores.map(s => `${(data[s]||[]).length} ${s}`).join(', ');
  const ok = await confirmDialog(
    `Restore backup${data.exportedAt ? ' from ' + fmtDateTime(data.exportedAt) : ''}? This REPLACES everything currently in the app (${State.contacts.length} contacts) with the backup (${counts}). Export a backup of the current data first if you want to keep it.`,
    { danger: true, okLabel: 'Replace & restore', requireType: 'RESTORE' });
  if (!ok) return;
  for (const s of stores) {
    await new Promise((res, rej) => { const r = tx(s, 'readwrite').clear(); r.onsuccess = res; r.onerror = () => rej(r.error); });
    await idbBulk(s, (data[s] || []).filter(x => x && x.id));
  }
  if (data.settings && data.settings.id === 'app') await idbPut('settings', data.settings);
  State.session = null;
  await loadAll();
  applyTheme(State.settings.theme || (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
  toast('Backup restored', 'good');
  navigate('#/home');
}
async function wipeAll(){
  if (!await confirmDialog('This permanently erases ALL lists, contacts, accounts, and history from this device. Export a backup first if you want to keep it.', { danger:true, okLabel:'Erase everything', requireType:'ERASE' })) return;
  for (const s of STORES) await new Promise(r => { const req = tx(s,'readwrite').clear(); req.onsuccess=r; req.onerror=r; });
  await loadAll(); toast('All data erased'); navigate('#/home');
}

/* ===== empty state ==================================================== */
function emptyState(ic, title, sub, btn, href){ return `<div class="empty"><div class="ic">${ic}</div><h3>${esc(title)}</h3>${sub?`<p>${esc(sub)}</p>`:''}${btn?`<div style="margin-top:16px"><button class="btn primary" data-nav="${href}">${esc(btn)}</button></div>`:''}</div>`; }
function bindEmpty(scope){ $$('[data-nav]', scope).forEach(b => b.onclick = () => navigate(b.dataset.nav)); }

/* ===== 12. Boot ======================================================= */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); $('#theme-toggle').textContent = t==='dark'?'☀️':'🌙'; }
function bindGlobalNav() {
  document.body.addEventListener('click', e => { const el = e.target.closest('[data-nav]'); if (el) { e.preventDefault(); navigate(el.dataset.nav); } });
  $('#theme-toggle').onclick = () => { const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; saveSettings({ theme:t }); applyTheme(t); };
}
window.addEventListener('hashchange', render);
(async function boot() {
  try {
    await openDB();
    await loadAll();
    applyTheme(State.settings.theme || (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    bindGlobalNav();
    if (!location.hash) location.hash = '#/home';
    render();
  } catch (e) {
    $('#view').innerHTML = `<div class="empty"><div class="ic">⚠️</div><h3>Could not start</h3><p>${esc(e.message||e)}</p></div>`;
    console.error(e);
  }
})();

/* expose a few for debugging / testing */
window.Rolodesk = { State, Import, seedSample, parseCSV, domainOf, companyKey, resolveZone, phoneKeyOf, callBand };
})();
